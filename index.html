        const stats = useMemo(() => { 
          return { 
            total: baseFilteredJobs.length, 
            new: baseFilteredJobs.filter(j => getSafeStatus(j.status) === 'งานใหม่').length, 
            received: baseFilteredJobs.filter(j => getSafeStatus(j.status) === 'รับเรื่อง').length, 
            proposed: baseFilteredJobs.filter(j => getSafeStatus(j.status) === 'อนุมัติแล้ว').length, 
            assigned: baseFilteredJobs.filter(j => getSafeStatus(j.status) === 'จ่ายงานแล้ว').length, 
            sap: baseFilteredJobs.filter(j => getSafeStatus(j.status) === 'สับเปลี่ยน SAP แล้ว').length, 
            teco: baseFilteredJobs.filter(j => getSafeStatus(j.status) === 'ปิดงาน (TECO)').length, 
            cancelled: baseFilteredJobs.filter(j => getSafeStatus(j.status) === 'ยกเลิก').length, 
          }; 
        }, [baseFilteredJobs]);

        const processedJobs = useMemo(() => { 
          let result = baseFilteredJobs; 
          if (Array.isArray(filterStatus)) { 
            result = result.filter(j => filterStatus.includes(getSafeStatus(j.status))); 
          } else if (filterStatus !== 'all') { 
            result = result.filter(j => getSafeStatus(j.status) === filterStatus); 
          } 
          if (sortConfig.key) { 
            result.sort((a, b) => { 
              let aValue = a[sortConfig.key]; let bValue = b[sortConfig.key]; 
              if (sortConfig.key === 'timestamp') { aValue = parseDate(a.timestamp) || new Date(0); bValue = parseDate(b.timestamp) || new Date(0); } 
              else { aValue = String(aValue || '').toLowerCase(); bValue = String(bValue || '').toLowerCase(); } 
              if (aValue < bValue) return sortConfig.direction === 'ascending' ? -1 : 1; 
              if (aValue > bValue) return sortConfig.direction === 'ascending' ? 1 : -1; return 0; 
            }); 
          } 
          return result;
        }, [baseFilteredJobs, filterStatus, sortConfig]);

        const statCards = [ { id: 'all', title: 'งานทั้งหมด', value: stats.total, textColor: 'text-[#5F259F]', bgColor: 'bg-purple-50', borderColor: 'border-purple-100', icon: 'FileText', iconColor: 'text-purple-600' }, { id: 'new', title: 'งานใหม่', value: stats.new, textColor: 'text-gray-700', bgColor: 'bg-gray-100', borderColor: 'border-gray-200', icon: 'Clock', iconColor: 'text-gray-500' }, { id: 'received', title: 'รับเรื่อง', value: stats.received, textColor: 'text-blue-600', bgColor: 'bg-blue-50', borderColor: 'border-blue-100', icon: 'Download', iconColor: 'text-blue-500' }, { id: 'proposed', title: 'อนุมัติแล้ว', value: stats.proposed, textColor: 'text-indigo-600', bgColor: 'bg-indigo-50', borderColor: 'border-indigo-100', icon: 'FileText', iconColor: 'text-indigo-500' }, { id: 'assigned', title: 'จ่ายงานแล้ว', value: stats.assigned, textColor: 'text-amber-600', bgColor: 'bg-amber-50', borderColor: 'border-amber-200', icon: 'Refresh', iconColor: 'text-amber-500' }, { id: 'sap', title: 'สับเปลี่ยน SAP แล้ว', value: stats.sap, textColor: 'text-teal-600', bgColor: 'bg-teal-50', borderColor: 'border-teal-200', icon: 'Check', iconColor: 'text-teal-500' }, { id: 'teco', title: 'ปิดงาน (TECO)', value: stats.teco, textColor: 'text-emerald-600', bgColor: 'bg-emerald-50', borderColor: 'border-emerald-200', icon: 'CheckCircle', iconColor: 'text-emerald-500' }, { id: 'cancelled', title: 'ยกเลิก', value: stats.cancelled, textColor: 'text-red-600', bgColor: 'bg-red-50', borderColor: 'border-red-200', icon: 'X', iconColor: 'text-red-500' } ];
        
        const handleStatusDropdownChange = (id, newStatus) => { 
          const targetJob = jobs.find(j => j.id === id);
          if (!targetJob) return;

          // 🔴 ดักจับการเลือก "ยกเลิก" จากหน้าป้ายงาน
          if (newStatus === 'ยกเลิก') {
             alert('⚠️ การยกเลิกใบงานจำเป็นต้องระบุเหตุผลประกอบ\n\nระบบจะเปิดหน้าต่างรายละเอียดใบงานเพื่อให้ท่านกรอกเหตุผลการยกเลิกก่อนบันทึกครับ');
             // บังคับเปลี่ยนตัวแปรสถานะของ Job ล่วงหน้าเพื่อให้กล่องเหตุผลสีแดงเด้งขึ้นมา
             setEditingJob({ ...targetJob, status: 'ยกเลิก' });
             return; // เบรกการบันทึกออโต้ทันที
          }

          if (newStatus === 'ปิดงาน (TECO)') {
             setTecoModalJob(targetJob);
             const oldImages = targetJob.auditLink && targetJob.auditLink !== '-' ? targetJob.auditLink.split(',') : [];
             setAuditImages(oldImages); 
             return;
          }
          onStatusChange(id, newStatus); 
        };

        const handleCloseJobTECO = async () => {
           if (!tecoModalJob) return;
           if (auditImages.length === 0) {
              alert('กรุณาแนบรูปถ่ายหรือไฟล์เอกสารอย่างน้อย 1 ไฟล์ เพื่อยืนยันการปิดงาน (TECO)');
              return;
           }
           setIsSubmittingTECO(true);
           try {
              let processedImages = await Promise.all(
                auditImages.map(img => img.startsWith('data:image') || img.startsWith('data:application/pdf') ? compressImage(img) : img)
              );
              
              onStatusChange(tecoModalJob.id, 'ปิดงาน (TECO)', { auditImages: processedImages });
              
              setTimeout(() => {
                 setIsSubmittingTECO(false);
                 setAuditImages([]);
                 setTecoModalJob(null);
                 //alert('บันทึกปิดงาน (TECO) สำเร็จ!');
              }, 1500); 
           } catch (err) {
              alert('เกิดข้อผิดพลาด: ' + err);
              setIsSubmittingTECO(false);
           }
        };

        const handleCompletionConfirm = (id, data, mode) => { 
           // 🚀 รับค่าโหมดมาว่าเป็นการบันทึกหลอกหน้าบ้าน (optimistic) หรือบันทึกจริง (edit)
           onStatusChange(id, null, data, mode || 'edit'); 
           setEditingJob(null); // สั่งปิด Popup ทันที
        };
        
        const openPrintPage = (jobId, pea) => { 
          const targetJob = jobs.find(j => j.id === jobId);
          if (targetJob) {
            const printData = { docDate: targetJob.timestamp, name: targetJob.userName || '', address1: targetJob.userAddress || '', address2: '', peaNumber: targetJob.ca || targetJob.caNo || targetJob.meterId, meterDesc: targetJob.meterSize || '', reason: targetJob.cause || '', reqName: targetJob.reporterName || '', oldPea: targetJob.meterId || '', newPea: '', newAmp: '', newRead: '', newPhase: '', lat: targetJob.lat || '', lng: targetJob.lng || '' };
            localStorage.setItem('instantPrintData_' + jobId, JSON.stringify(printData));
          }
          // 🚀 เปิดหน้าต่างพิมพ์ดีดบน Vercel โดยตรงทันที ไม่ต้องรอหลังบ้าน Google Apps Script หมุนโหลด
          window.open(`/print.html?jobId=${jobId}`, '_blank');
        };

        return (
          <div className="w-full h-full pb-4 animate-fade-in -mt-2 sm:-mt-5">
            <div className="flex flex-row items-center justify-between gap-2 sm:gap-4 mb-2">
              <div className="flex items-center shrink min-w-0 pb-1"><h2 className="text-xl sm:text-3xl md:text-3xl font-black text-[#5F259F] tracking-tight uppercase truncate">รายการแจ้งซ่อมทั้งหมด</h2></div>
              <div className="flex items-center gap-1.5 sm:gap-2 shrink-0">
                <div className="text-[9px] sm:text-[10px] font-bold text-gray-400 bg-white p-1.5 sm:p-2 px-2.5 sm:px-4 rounded-full border border-gray-100 uppercase tracking-widest shadow-sm whitespace-nowrap">{lastUpdated ? `Sync: ${formatTime(lastUpdated)}` : 'No Sync'}</div>
                <button onClick={onRefresh} disabled={isRefreshing} className={`flex items-center justify-center p-2 sm:p-2.5 bg-white border border-gray-100 text-[#5F259F] rounded-full hover:bg-purple-50 transition-all shadow-sm shrink-0 ${isRefreshing ? 'opacity-50' : ''}`}><Icon name="Refresh" className={`w-3.5 h-3.5 sm:w-4 sm:h-4 ${isRefreshing ? 'animate-spin' : ''}`} /></button>
              </div>
            </div>

            <div className="grid grid-cols-4 md:grid-cols-8 gap-2 sm:gap-4 mb-4">
              {statCards.map((stat, idx) => {
                const statusValue = stat.id === 'all' ? 'all' : stat.title; 
                const isActive = Array.isArray(filterStatus) ? filterStatus.includes(statusValue) : filterStatus === statusValue;
                
                const roles = getUserRoles(currentUser);
                const isAdmin = roles.includes('Admin');
                let isActionable = false; 
                if (stat.id !== 'all') {
                   if (isAdmin) { isActionable = true; } else {
                      if (roles.includes('Employee') && stat.id === 'new') isActionable = true;
                      else if (roles.includes('Coordinator') && (stat.id === 'new' || stat.id === 'received')) isActionable = true;
                      else if (roles.includes('Approver') && (stat.id === 'received' || stat.id === 'proposed')) isActionable = true;
                      else if (roles.includes('Inventory') && (stat.id === 'proposed' || stat.id === 'assigned')) isActionable = true;
                      else if (roles.includes('SAP') && (stat.id === 'assigned' || stat.id === 'sap')) isActionable = true;
                      else if (roles.includes('Audit') && (stat.id === 'sap' || stat.id === 'teco')) isActionable = true;
                   }
                }
                const hasNew = stat.value > (seenCounts[stat.id] || 0) && stat.value > 0 && isActionable;

                const handleCardClick = () => {
                  setFilterStatus(statusValue);
                  const newSeen = { ...seenCounts, [stat.id]: stat.value };
                  setSeenCounts(newSeen);
                  localStorage.setItem(`seenCounts_${currentUser?.username || 'guest'}`, JSON.stringify(newSeen));
                };

                return (
                  <div key={idx} onClick={handleCardClick} className={`px-2 py-2 sm:px-3 sm:py-2.5 rounded-xl border-2 flex flex-col justify-between relative overflow-hidden group transition-all duration-300 cursor-pointer select-none ${isActive ? `${stat.bgColor} ${stat.borderColor.replace(/100|200/g, '400')} shadow-md scale-[1.05]` : `bg-white ${stat.borderColor} shadow-sm opacity-60 hover:opacity-100 hover:scale-[1.02] grayscale-[20%]`}`}>
                    {hasNew && (
                      <span className="absolute top-1.5 right-1.5 flex h-2.5 w-2.5 sm:h-3 sm:w-3 z-10" title="มีรายการใหม่">
                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span className="relative inline-flex rounded-full h-2.5 w-2.5 sm:h-3 sm:w-3 bg-red-500 border border-white shadow-sm"></span>
                      </span>
                    )}
                    <div className="flex justify-between items-start mb-0.5 sm:mb-1">
                      <p className={`text-[9px] sm:text-[10px] font-bold uppercase tracking-wide leading-tight break-words pr-0 sm:pr-1 transition-colors ${isActive ? stat.textColor : 'text-gray-500'}`}>{stat.title}</p>
                      <div className={`${isActive ? 'bg-white shadow-sm' : stat.bgColor} p-1 rounded-lg shrink-0 hidden sm:block transition-transform ${isActive ? 'scale-110' : ''}`}>
                        <Icon name={stat.icon} className={`w-3 h-3 sm:w-3.5 sm:h-3.5 ${stat.iconColor}`} />
                      </div>
                    </div>
                    <h3 className={`text-base sm:text-2xl font-black mt-0.5 transition-colors leading-none ${isActive ? stat.textColor : 'text-gray-600'}`}>{stat.value}</h3>
                  </div>
                );
              })}
            </div>

            <div className="bg-white p-2 sm:p-5 rounded-2xl shadow-sm border border-gray-100 mb-4 overflow-hidden transition-all duration-300">
              <div className="flex justify-start items-center gap-3">
                <button type="button" onClick={() => setIsFilterOpen(!isFilterOpen)} className="flex items-center gap-2 text-[#5F259F] font-bold hover:bg-purple-50 px-3 py-1.5 rounded-xl transition-colors text-sm border border-transparent hover:border-purple-200"><div className="w-6 h-6 flex items-center justify-center rounded-full bg-[#5F259F] text-white">{isFilterOpen ? <span className="text-lg leading-none pb-0.5">-</span> : <span className="text-lg leading-none pb-0.5">+</span>}</div>{isFilterOpen ? "ย่อแถบค้นหา" : "ขยายแถบค้นหา"}</button>
                {filterYear ? ( <span className="text-[12px] sm:text-sm font-bold text-[#5F259F] bg-purple-50 px-3 py-1.5 rounded-lg border border-purple-100 animate-fade-in flex items-center gap-1.5 shadow-sm"><Icon name="Timer" className="w-3.5 h-3.5" /> ข้อมูลปี: {filterYear}</span>
                ) : ( <span className="text-[12px] sm:text-sm font-bold text-gray-500 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-200 animate-fade-in flex items-center gap-1.5 shadow-sm"><Icon name="Timer" className="w-3.5 h-3.5" /> ข้อมูลทั้งหมด</span> )}
              </div>
              {isFilterOpen && (
                <div className="flex flex-col xl:flex-row gap-4 w-full mt-4 animate-fade-in">
                  <div className="flex flex-col sm:flex-row gap-3 w-full xl:flex-[2]">
                    <div className="relative w-full sm:flex-[3]"><input type="text" placeholder="ค้นหาเลขมิเตอร์ CA หรือ No..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-12 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#5F259F] focus:bg-white outline-none text-sm font-medium transition-all" /><Icon name="Search" className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" /></div>
                    <div className="relative w-full sm:flex-1"><div className="absolute left-3.5 top-1/2 -translate-y-1/2 flex items-center pointer-events-none"><Icon name="Timer" className="w-5 h-5 text-gray-400" /></div><select value={filterYear} onChange={e => setFilterYear(e.target.value)} className="w-full pl-10 pr-8 py-3.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#5F259F] focus:bg-white outline-none text-sm font-medium transition-all appearance-none cursor-pointer text-gray-700"><option value="">ปี: ทั้งหมด</option>{[0, 1, 2, 3, 4, 5].map(i => { const y = new Date().getFullYear() - i; return <option key={y} value={y}>ปี {y}</option>; })}</select><Icon name="ChevronDown" className="absolute right-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" /></div>
                  </div>
                  <div className="flex flex-col sm:flex-row items-center gap-3 w-full xl:flex-[1.5]">
                    <div className="relative w-full sm:flex-1 flex items-center bg-gray-50 border border-gray-200 rounded-xl focus-within:ring-2 focus-within:ring-[#5F259F] focus-within:bg-white transition-all overflow-hidden cursor-pointer"><div className="pl-4 pr-2 flex items-center pointer-events-none"><Icon name="Clock" className="w-5 h-5 text-gray-400 mr-2" /><span className="text-sm font-medium text-gray-400 whitespace-nowrap mt-[1px]">เริ่มต้น:</span></div><input type="date" value={filterDateStart} onChange={(e) => setFilterDateStart(e.target.value)} className="w-full pr-4 py-3.5 bg-transparent outline-none text-sm font-medium text-gray-700 cursor-pointer" /></div>
                    <span className="text-gray-400 font-medium text-sm hidden sm:block">ถึง</span>
                    <div className="relative w-full sm:flex-1 flex items-center bg-gray-50 border border-gray-200 rounded-xl focus-within:ring-2 focus-within:ring-[#5F259F] focus-within:bg-white transition-all overflow-hidden cursor-pointer"><div className="pl-4 pr-2 flex items-center pointer-events-none"><Icon name="Clock" className="w-5 h-5 text-gray-400 mr-2" /><span className="text-sm font-medium text-gray-400 whitespace-nowrap mt-[1px]">สิ้นสุด:</span></div><input type="date" value={filterDateEnd} onChange={(e) => setFilterDateEnd(e.target.value)} className="w-full pr-4 py-3.5 bg-transparent outline-none text-sm font-medium text-gray-700 cursor-pointer" /></div>
                    {(filterDateStart || filterDateEnd) && ( <button onClick={() => { setFilterDateStart(''); setFilterDateEnd(''); }} className="p-3.5 bg-red-50 text-red-500 hover:bg-red-100 rounded-xl transition-all border border-red-100 w-full sm:w-auto flex justify-center items-center gap-1.5 shadow-sm" title="ล้างช่วงวันที่"><Icon name="X" className="w-5 h-5" /><span className="sm:hidden text-sm font-medium">ล้างวันที่ค้นหา</span></button> )}
                  </div>
                </div>
              )}
            </div>

            <div className={`relative ${showMobileCards ? 'md:bg-white md:rounded-3xl md:shadow-xl md:border md:border-gray-100 md:overflow-hidden' : 'bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden'}`}>
              
              {showMobileCards && (
                <div className="block md:hidden space-y-3 max-h-[75vh] overflow-y-auto pb-8 pt-2 no-scrollbar">
                  {processedJobs.length > 0 ? processedJobs.map(job => {
                    const statusStr = getSafeStatus(job.status); 
                    const statusConfig = STATUS_OPTIONS[statusStr] || STATUS_OPTIONS['งานใหม่']; 
                    const isCancelled = statusStr === 'ยกเลิก'; 
                    const availableStatuses = getAvailableStatuses(currentUser, statusStr); 
                    const tableStatuses = availableStatuses.filter(s => s !== 'ยกเลิก' || statusStr === 'ยกเลิก');
                    const isStatusDisabled = tableStatuses.length <= 1;
                    const isExpanded = expandedMobileId === job.id;
                    
                    const bgColor = statusConfig.color.split(' ')[0].replace(/-50|-100/g, '-200');
                    const textColor = statusConfig.color.split(' ')[1];
                    const borderColor = statusConfig.color.split(' ')[2].replace(/-200|-300/g, '-400');
                    const dateOnly = formatDate(job.timestamp).split(',')[0];
                    let firstImg = null;
                    if (job.image) {
                        if (typeof job.image === 'string') firstImg = job.image.split(',').filter(Boolean)[0];
                        else if (Array.isArray(job.image)) firstImg = job.image[0];
                    }

                    // 💡 ฟังก์ชันสร้างป้ายเตือนแบบฉลาด
                    const renderMobileAgingBadge = () => {
                      if (statusStr === 'ปิดงาน (TECO)') {
                        const showDuration = job.duration && job.duration !== '-' && !String(job.duration).includes("NaN");
                        return (
                           <div className="inline-flex items-center px-1.5 py-0.5 rounded text-[9px] font-bold border shadow-sm bg-green-50 text-green-700 border-green-200">
                             จบงาน {formatShowDays(job.duration ? job.duration : calculateTimeElapsed(job.timestamp))}
                           </div>
                        );
                      }
                      
                      const days = (!isNaN(Number(job.agingDays)) && job.agingDays !== '') ? Number(job.agingDays) : 0;
                      return (
                        <div className={`inline-flex items-center px-1.5 py-0.5 rounded text-[9px] font-bold border shadow-sm ${
                          days <= 3 ? 'bg-yellow-50 text-yellow-700 border-yellow-200' : 
                          days <= 7 ? 'bg-orange-50 text-orange-700 border-orange-200' : 'bg-red-50 text-red-700 border-red-200' 
                        }`}>
                          <span className={`w-1.5 h-1.5 rounded-full mr-1 animate-pulse ${
                            days <= 3 ? 'bg-yellow-500' : days <= 7 ? 'bg-orange-500' : 'bg-red-500'
                          }`}></span>
                          ค้าง {days} วัน
                        </div>
                      );
                    };

                    return (
                      <div key={job.id} className={`${bgColor} shadow-sm relative transition-all duration-300 ${isExpanded ? 'rounded-[1.5rem] shadow-lg' : 'rounded-[1.25rem]'} ${isCancelled ? 'opacity-60 grayscale' : ''}`}>
                        <div onClick={() => setExpandedMobileId(isExpanded ? null : job.id)} className={`p-3 cursor-pointer flex gap-3 ${isExpanded ? 'border-b border-white/60' : ''}`}>
                           <div className="w-[85px] h-[85px] sm:w-[100px] sm:h-[100px] shrink-0 bg-white rounded-xl overflow-hidden border border-gray-200 shadow-sm flex items-center justify-center pointer-events-none">
                              {firstImg ? (
                                 <img src={getProcessedImageUrl(firstImg)} alt="cover" className="w-full h-full object-cover" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/60?text=No+Img'; }} />
                              ) : (
                                 <span className="text-[9px] font-bold text-gray-400">ไม่มีรูป</span>
                              )}
                           </div>
                           
                           <div className="flex flex-col flex-1 justify-between min-w-0 py-0.5">
                               <div className="flex justify-between items-start gap-2">
                                  <div className="flex flex-col min-w-0">
                                     <div className="flex items-center gap-2 flex-wrap">
                                        <span className="font-black text-[17px] text-[#5F259F] leading-none tracking-tight truncate">{job.jobNo}</span>
                                        {renderMobileAgingBadge()}
                                     </div>
                                     <span className="text-[11px] text-gray-700 font-bold mt-1.5 truncate">{dateOnly} <span className="text-gray-500 font-medium ml-1">โดย {job.reporterName}</span></span>
                                  </div>
                                  <div className="shrink-0">
                                     <span className={`text-[10px] px-2 py-1 rounded-md font-black shadow-sm bg-white ${textColor}`}>{statusStr}</span>
                                  </div>
                               </div>
                               <div className="flex justify-between items-end gap-2 mt-1">
                                  <div className="flex flex-col flex-1 min-w-0">
                                     <p className="text-[11px] text-gray-700 font-bold truncate w-full">
                                        PEA NO : {job.meterId} <span className="text-gray-400 mx-1 font-normal opacity-40">|</span> {job.cause}
                                     </p>
                                  </div>
                                  <div className={`p-1 rounded-full shrink-0 transition-transform duration-300 bg-white shadow-sm border ${borderColor} ${isExpanded ? 'rotate-180' : ''}`}>
                                     <Icon name="ChevronDown" className={`w-3.5 h-3.5 ${textColor}`} />
                                  </div>
                               </div>
                           </div>
                        </div>

                        {isExpanded && (
                          <div className="p-4 animate-fade-in bg-white/40 rounded-b-[1.25rem]">
                            <div className="flex flex-col gap-4">
                               <div className="flex justify-start overflow-x-auto gap-3 py-1 no-scrollbar w-full">
                                 {job.image ? (typeof job.image === 'string' ? job.image.split(',') : job.image).filter(Boolean).map((imgUrl, imgIdx, arr) => (
                                   <div key={imgIdx} className="w-[80px] h-[80px] sm:w-[100px] sm:h-[100px] shrink-0 rounded-xl shadow-sm overflow-hidden border border-gray-200">
                                      <img src={getProcessedImageUrl(imgUrl)} alt={`job-img-${imgIdx}`} className="w-full h-full object-cover cursor-pointer hover:scale-105 transition-transform" onClick={(e) => { e.stopPropagation(); setSelectedImage(arr); setCurrentImgIdx(imgIdx); }} onError={(e) => { e.target.src = 'https://via.placeholder.com/100?text=No+Img'; }} />
                                   </div>
                                 )) : (
                                   <div className="w-[80px] h-[80px] sm:w-[100px] sm:h-[100px] shrink-0 rounded-xl shadow-sm overflow-hidden border border-gray-200 bg-gray-50 flex items-center justify-center text-gray-400 text-[10px] font-bold">No Image</div>
                                 )}
                               </div>

                               <div className="space-y-3 bg-white/80 p-4 rounded-2xl border border-white/50 shadow-sm">
                                  <div className="flex items-center gap-3">
                                     <div className="p-2 bg-blue-50 text-blue-600 rounded-lg shadow-sm border border-blue-100">
                                        <Icon name="MapPin" className="w-5 h-5" />
                                     </div>
                                     <div className="flex flex-col">
                                        <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">พิกัดสถานที่</p>
                                        {job.lat ? (
                                          <a href={`https://maps.google.com/?q=${job.lat},${job.lng}`} target="_blank" onClick={(e) => e.stopPropagation()} className="text-[12px] font-black text-blue-600 hover:text-blue-800 leading-tight">
                                            {job.lat}, {job.lng}
                                          </a>
                                        ) : (
                                          <p className="text-[15px] font-black text-gray-400 leading-tight">ไม่ได้ระบุพิกัด</p>
                                        )}
                                     </div>
                                  </div>
                                  <div className="h-[1px] bg-gray-100 w-full"></div>
                                  <div className="grid grid-cols-2 gap-4">
                                     <div>
                                        <p className="text-[10px] text-gray-400 font-bold uppercase mb-1">ผู้ใช้ไฟฟ้า (CA)</p>
                                        <p className="text-[16px] font-black text-gray-800">{job.ca || job.caNo || '-'}</p>
                                     </div>
                                     <div>
                                        <p className="text-[10px] text-gray-400 font-bold uppercase mb-1">หมวดมิเตอร์</p>
                                        <p className="text-[14px] font-bold text-gray-700 leading-tight">{job.meterSize || '-'}</p>
                                     </div>
                                  </div>
                                  <div className="pt-1">
                                     <p className="text-[10px] text-gray-400 font-bold uppercase mb-1">ชื่อ-นามสกุล</p>
                                     <p className="text-[16px] font-black text-gray-800">{job.userName || '-'}</p>
                                  </div>
                               </div>

                               <div className="flex flex-col gap-3">
                                  <div className="relative w-full">
                                  <select 
                                    onClick={(e) => e.stopPropagation()}
                                    value={statusStr} 
                                    onChange={(e) => {
                                      e.stopPropagation();
                                      const selectedVal = e.target.value;
                                      
                                      // 🔴 ดักจับถ้ากดเลือกยกเลิกในหน้าตรวจสอบข้อมูล
                                      if (selectedVal === 'ยกเลิก') {
                                         alert('⚠️ การยกเลิกใบงานจำเป็นต้องระบุเหตุผลประกอบ\n\nระบบจะเปิดหน้าต่างรายละเอียดใบงานเพื่อให้ท่านกรอกเหตุผลการยกเลิกก่อนบันทึกครับ');
                                         // สั่งเปิดกล่องป๊อปอัปแก้ไขข้อมูลหลัก (JobCompletionModal) ขึ้นมาทันที
                                         setEditingJob({ ...targetJob, status: 'ยกเลิก' });
                                         return;
                                      }
                                      
                                      if (selectedVal === 'ปิดงาน (TECO)') {
                                         setTecoModalJob(targetJob);
                                         setAuditImages([]); 
                                         return;
                                      }
                                      onStatusChange(targetJob.id, selectedVal);
                                    }} 
                                    disabled={isStatusDisabled} 
                                    className={`w-full text-[16px] font-black h-14 pl-4 pr-10 rounded-2xl border-none shadow-lg appearance-none transition-all ${statusConfig.color} ${isStatusDisabled ? 'opacity-50' : 'active:scale-95'}`}
                                  >
                                    {tableStatuses.map(s => <option key={s} value={s}>{s}</option>)}
                                  </select>
                                    <Icon name="ChevronDown" className="w-6 h-6 absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none opacity-70" />
                                  </div>
                                  
                                  <div className="flex gap-2 h-12">
                                     {canUserPrint(currentUser) && (
                                       <button onClick={(e) => { e.stopPropagation(); openPrintPage(job.id, job.meterId); }} className="flex-1 bg-white text-emerald-600 rounded-xl border border-emerald-100 shadow-sm font-black text-[14px] flex items-center justify-center gap-2">
                                           <Icon name="Printer" className="w-5 h-5" /> พิมพ์ PDF
                                       </button>
                                     )}
                                     <button onClick={(e) => { e.stopPropagation(); setEditingJob(job); }} className={`flex-1 bg-[#5F259F] text-white rounded-xl shadow-md font-black text-[14px] flex items-center justify-center gap-2`}>
                                        <Icon name={canUserEditCoreData(currentUser, job.status) ? "Edit" : "Eye"} className="w-5 h-5" /> 
                                        {canUserEditCoreData(currentUser, job.status) ? "แก้ไขข้อมูล" : "ดูรายละเอียด"}
                                     </button>
                                  </div>
                               </div>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  }) : <div className="text-center text-gray-400 py-10 italic font-medium">ไม่พบข้อมูลที่ตรงกับเงื่อนไข</div>}
                </div>
              )}

              <div className={`overflow-x-auto overflow-y-auto max-h-[65vh] ${showMobileCards ? 'hidden md:block' : 'block'}`}>
                <table className="w-full text-left border-collapse min-w-[1200px]">
                  <thead className="bg-[#F3E8FF] border-b border-purple-200 sticky top-0 z-20 shadow-sm">
                    <tr>
                      <th onClick={() => requestSort('jobNo')} className="sortable-th px-3 py-4 text-xs whitespace-nowrap font-bold text-black uppercase tracking-widest bg-[#F3E8FF]">เลขที่ {renderSortIcon('jobNo')}</th>
                      <th onClick={() => requestSort('timestamp')} className="sortable-th px-3 py-4 text-xs whitespace-nowrap font-bold text-black uppercase tracking-widest bg-[#F3E8FF]">วันที่แจ้ง {renderSortIcon('timestamp')}</th>
                      <th onClick={() => requestSort('meterId')} className="sortable-th px-3 py-4 text-xs whitespace-nowrap font-bold text-black uppercase tracking-widest bg-[#F3E8FF]">PEA มิเตอร์ {renderSortIcon('meterId')}</th>
                      <th onClick={() => requestSort('ca')} className="sortable-th px-3 py-4 text-xs whitespace-nowrap font-bold text-black uppercase tracking-widest bg-[#F3E8FF]">หมายเลขผู้ใช้ไฟฟ้า {renderSortIcon('ca')}</th>
                      <th onClick={() => requestSort('userName')} className="sortable-th px-3 py-4 text-xs whitespace-nowrap font-bold text-black uppercase tracking-widest max-w-[150px] bg-[#F3E8FF]">ชื่อ-นามสกุล {renderSortIcon('userName')}</th>
                      <th onClick={() => requestSort('cause')} className="sortable-th px-3 py-4 text-xs whitespace-nowrap font-bold text-black uppercase tracking-widest max-w-[150px] bg-[#F3E8FF]">สาเหตุชำรุด {renderSortIcon('cause')}</th>
                      <th className="px-3 py-4 text-xs whitespace-nowrap font-bold text-black uppercase tracking-widest text-center bg-[#F3E8FF]">รูปภาพ</th>
                      <th className="px-3 py-4 text-xs whitespace-nowrap font-bold text-black uppercase tracking-widest text-center bg-[#F3E8FF]">พิกัด</th>
                      <th onClick={() => requestSort('status')} className="sortable-th px-3 py-4 text-xs whitespace-nowrap font-bold text-black uppercase tracking-widest text-center bg-[#F3E8FF]">สถานะงาน {renderSortIcon('status')}</th>
                      <th className="px-3 py-4 text-xs whitespace-nowrap font-bold text-black uppercase tracking-widest text-center bg-[#F3E8FF]">จัดการ</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-50">
                    {processedJobs.length > 0 ? processedJobs.map(job => {
                      const statusStr = getSafeStatus(job.status); const statusConfig = STATUS_OPTIONS[statusStr] || STATUS_OPTIONS['งานใหม่']; const isCancelled = statusStr === 'ยกเลิก'; 
                      const availableStatuses = getAvailableStatuses(currentUser, statusStr); 
                      const tableStatuses = availableStatuses.filter(s => s !== 'ยกเลิก' || statusStr === 'ยกเลิก');
                      const isStatusDisabled = tableStatuses.length <= 1;
                      
                      // 💡 ฟังก์ชันสร้างป้ายเตือนแบบฉลาด (Desktop)
                      const renderDesktopAgingBadge = () => {
                        if (statusStr === 'ปิดงาน (TECO)') {
                          const showDuration = job.duration && job.duration !== '-' && !String(job.duration).includes("NaN");
                          return (
                             <div className="mt-1 inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold border shadow-sm bg-green-50 text-green-700 border-green-200">
                               จบงาน {formatShowDays(job.duration ? job.duration : calculateTimeElapsed(job.timestamp))}
                             </div>
                          );
                        }
                        
                        const days = (!isNaN(Number(job.agingDays)) && job.agingDays !== '') ? Number(job.agingDays) : 0;
                        return (
                          <div className={`mt-1 inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold border shadow-sm ${
                            days <= 3 ? 'bg-yellow-50 text-yellow-700 border-yellow-200' : 
                            days <= 7 ? 'bg-orange-50 text-orange-700 border-orange-200' : 'bg-red-50 text-red-700 border-red-200' 
                          }`}>
                            <span className={`w-1.5 h-1.5 rounded-full mr-1 animate-pulse ${
                              days <= 3 ? 'bg-yellow-500' : days <= 7 ? 'bg-orange-500' : 'bg-red-500'
                            }`}></span>
                            ค้าง {days} วัน
                          </div>
                        );
                      };

                      return (
                      <tr key={job.id} onClick={() => setEditingJob(job)} className={`transition-colors text-xs cursor-pointer group ${isCancelled ? 'bg-gray-100 opacity-50 grayscale' : 'hover:bg-purple-100/60'}`} title={canUserEditCoreData(currentUser, job.status) ? "คลิกเพื่อดูและแก้ไขข้อมูล" : "คลิกเพื่อดูรายละเอียดข้อมูล"}>
                        <td className="px-3 py-2 align-middle whitespace-nowrap">
                          <div className="font-bold text-[#5F259F]">{job.jobNo}</div>
                          {renderDesktopAgingBadge()}
                        </td>
                        <td className="px-3 py-2 align-middle whitespace-nowrap"><div className="font-medium text-gray-800">{formatDate(job.timestamp)}</div>{job.reporterName && <div className="text-[10px] text-gray-500 mt-0.5">แจ้งโดย {job.reporterName}</div>}</td>
                        <td className="px-3 py-2 align-middle whitespace-nowrap">
                          <div className="font-medium text-gray-800">PEA NO : {job.meterId}</div>
                          {job.meterSize && <div className="text-[10px] text-gray-500 mt-0.5">{job.meterSize}</div>}
                        </td>
                        <td className="px-3 py-2 align-middle whitespace-nowrap"><div className="font-medium text-gray-800">{job.ca || job.caNo}</div></td>
                        <td className="px-3 py-2 align-middle font-medium text-gray-800 max-w-[160px] truncate" title={job.userName || '-'}>{job.userName || '-'}</td>
                        <td className="px-3 py-2 align-middle font-medium text-gray-800 max-w-[160px] truncate" title={job.cause}>{job.cause}</td>
                        <td className="px-3 py-2 align-middle text-center">
                          {job.image ? (() => {
                            const imgs = (typeof job.image === 'string' ? job.image.split(',') : job.image).filter(Boolean);
                            return (
                              <div className="flex items-center justify-center py-1 mx-auto pointer-events-none">
                                <img src={getProcessedImageUrl(imgs[0])} alt="cover" className="w-[40px] h-[40px] shrink-0 object-cover rounded-lg border border-gray-200 shadow-sm bg-white" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/50?text=No+Img'; }} />
                                {imgs.length > 1 && <span className="ml-1.5 text-[10px] font-bold text-gray-500 bg-gray-100 px-1.5 py-0.5 rounded-md shadow-sm">+{imgs.length - 1}</span>}
                              </div>
                            );
                          })() : <span className="text-[10px] text-gray-300 italic">-</span>}
                        </td>
                        <td className="px-3 py-2 align-middle text-center">
                          {(job.lat || job.lng) ? (
                            <div className="flex flex-col items-center justify-center gap-1 relative z-10">
                              <a href={`https://maps.google.com/?q=${job.lat},${job.lng}`} target="_blank" onClick={(e) => e.stopPropagation()} className="inline-flex p-1.5 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-100 transition shadow-sm border border-blue-100" title="เปิดใน Google Maps">
                                <Icon name="MapPin" className="w-4 h-4" />
                              </a>
                              <span className="text-[9px] text-gray-500 max-w-[110px] truncate" title={`${job.lat}, ${job.lng}`}>{job.lat}, {job.lng}</span>
                             </div>
                          ) : <span className="text-[10px] text-gray-300 italic">-</span>}
                        </td>
                        <td className="px-3 py-2 align-middle text-center">
                            <div className="relative inline-block w-full min-w-[125px] max-w-[150px] z-10">
                                <select 
                                  onClick={(e) => e.stopPropagation()} 
                                  value={statusStr} 
                                  onChange={(e) => { 
                                    e.stopPropagation();
                                    handleStatusDropdownChange(job.id, e.target.value); 
                                  }} 
                                  disabled={isStatusDisabled} 
                                  className={`w-full text-[11px] font-black px-2 py-2 rounded-xl border-none outline-none transition-all appearance-none text-center ${statusConfig.color} ${isStatusDisabled ? 'cursor-not-allowed opacity-80' : 'cursor-pointer'}`}
                                >
                                    {tableStatuses.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                {!isStatusDisabled && ( <Icon name="ChevronDown" className="w-3 h-3 absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none opacity-50" /> )}
                            </div>
                        </td>
                        <td className="px-3 py-2 align-middle text-center">
                          {canUserPrint(currentUser) ? ( <div className="flex items-center justify-center gap-1 relative z-10"><button onClick={(e) => { e.stopPropagation(); openPrintPage(job.id, job.meterId); }} className="p-2 bg-emerald-50 text-emerald-600 rounded-full hover:bg-emerald-100 transition shadow-sm border border-emerald-100" title="พิมพ์แบบฟอร์ม PDF"><Icon name="Printer" className="w-4 h-4" /></button></div> ) : <span className="text-[10px] text-gray-300 italic">-</span>}
                        </td>
                      </tr>
                    )}) : <tr><td colSpan="10" className="p-20 text-center text-gray-400 font-medium italic">ไม่พบข้อมูลที่ตรงกับเงื่อนไข</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>

            {selectedImage && selectedImage.length > 0 && ReactDOM.createPortal(
               <div 
                className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/95 backdrop-blur-md animate-fade-in select-none" 
                onClick={() => {setSelectedImage(null); setCurrentImgIdx(0);}}
                onTouchStart={(e) => { touchStartX.current = e.targetTouches[0].clientX; touchEndX.current = e.targetTouches[0].clientX; }}
                onTouchMove={(e) => { touchEndX.current = e.targetTouches[0].clientX; }}
                onTouchEnd={() => {
                  const distance = touchStartX.current - touchEndX.current;
                  const minSwipeDistance = 50; 
                  if (distance > minSwipeDistance) setCurrentImgIdx(prev => prev === selectedImage.length - 1 ? 0 : prev + 1);
                  else if (distance < -minSwipeDistance) setCurrentImgIdx(prev => prev === 0 ? selectedImage.length - 1 : prev - 1);
                  touchStartX.current = 0; touchEndX.current = 0;
                }}
              >
                <div className="relative w-full h-full flex items-center justify-center" onClick={e => e.stopPropagation()}>
                  <img src={getProcessedImageUrl(selectedImage[currentImgIdx])} alt="Evidence" className="max-h-screen max-w-full object-contain mx-auto pointer-events-none" />
                  
                  {selectedImage.length > 1 && (
                    <>
                      <button onClick={(e) => { e.stopPropagation(); setCurrentImgIdx(prev => prev === 0 ? selectedImage.length - 1 : prev - 1); }} className="absolute left-4 sm:left-10 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/80 text-white p-3 rounded-full transition shadow-lg z-50">
                        <svg className="w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M15 19l-7-7 7-7"></path></svg>
                      </button>
                      
                      <button onClick={(e) => { e.stopPropagation(); setCurrentImgIdx(prev => prev === selectedImage.length - 1 ? 0 : prev + 1); }} className="absolute right-4 sm:right-10 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/80 text-white p-3 rounded-full transition shadow-lg z-50">
                        <svg className="w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M9 5l7 7-7 7"></path></svg>
                      </button>
                      
                      <div className="absolute bottom-8 bg-black/60 text-white px-5 py-2 rounded-full text-sm font-bold tracking-widest z-50">
                        {currentImgIdx + 1} / {selectedImage.length}
                      </div>
                    </>
                  )}
                  
                  <button onClick={() => {setSelectedImage(null); setCurrentImgIdx(0);}} className="absolute top-4 right-4 sm:top-6 sm:right-6 bg-black/40 hover:bg-black/70 text-white p-2 sm:p-3 rounded-full transition z-50">
                    <Icon name="X" className="w-6 h-6 sm:w-8 sm:h-8" />
                  </button>
                </div>
              </div>, document.body
            )}
            {editingJob && <JobCompletionModal job={editingJob} onClose={() => setEditingJob(null)} onConfirm={handleCompletionConfirm} onDelete={onDeleteJob} mode={canUserEditCoreData(currentUser, editingJob.status) ? 'edit' : 'view'} currentUser={currentUser} />}
            
            {/* 💡 Pop-up Modal สำหรับแนบรูปปิดงาน (TECO) บนหน้า Dashboard */}
            {tecoModalJob && ReactDOM.createPortal(
               <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in" onClick={() => { if(!isSubmittingTECO) { setTecoModalJob(null); setAuditImages([]); } }}>
                 <div className="bg-white rounded-[2rem] shadow-2xl max-w-lg w-full overflow-hidden flex flex-col animate-fade-in-up border border-emerald-100" onClick={e => e.stopPropagation()}>
                   {/* Header */}
                   <div className="bg-gradient-to-r from-emerald-500 to-emerald-600 p-5 sm:p-6 text-white flex justify-between items-center shadow-md relative z-10">
                     <div>
                       <h2 className="text-xl sm:text-2xl font-black flex items-center gap-2 tracking-tight">
                         <Icon name="CheckCircle" className="w-6 h-6 sm:w-7 sm:h-7 text-emerald-100" /> ปิดงาน (TECO)
                       </h2>
                       <p className="text-emerald-100 text-xs mt-1 font-medium">แนบไฟล์เพื่อยืนยันการปิดงาน</p>
                     </div>
                     <button disabled={isSubmittingTECO} onClick={() => { setTecoModalJob(null); setAuditImages([]); }} className="p-2 hover:bg-white/20 rounded-full transition disabled:opacity-50">
                       <Icon name="X" className="w-6 h-6" />
                     </button>
                   </div>
                   {/* Body */}
                   <div className="p-6 sm:p-8 space-y-6 bg-emerald-50/30">
                     <div className="bg-white p-4 rounded-2xl shadow-sm border border-emerald-100 flex justify-between items-center">
                       <div className="flex flex-col">
                         <span className="text-gray-400 text-[10px] font-bold uppercase tracking-widest">เลขที่ใบงานอ้างอิง</span>
                         <span className="text-xl font-black text-gray-800">{tecoModalJob.jobNo || tecoModalJob.id || '-'}</span>
                       </div>
                       <div className="bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider">รอปิดงาน</div>
                     </div>
                     <div className="bg-white p-5 sm:p-6 rounded-2xl border border-emerald-200 shadow-sm space-y-4">
                       <div>
                         <label className="text-[15px] font-black text-emerald-800 flex items-center gap-2">
                           <Icon name="Camera" className="w-5 h-5 text-emerald-600" /> แนบหลักฐานเอกสาร/ภาพถ่าย *
                         </label>
                         <p className="text-[11px] text-emerald-600/70 font-bold mt-1">ต้องแนบอย่างน้อย 1 ไฟล์ (สูงสุด 5 ไฟล์)</p>
                       </div>
                       <div className="flex flex-wrap gap-3">
                         {auditImages.map((img, imgIdx) => (
                           <div key={imgIdx} className="relative w-20 h-20 sm:w-24 sm:h-24 rounded-xl overflow-hidden border border-emerald-200 bg-black flex justify-center group shrink-0">
                             {img.includes('application/pdf') ? (
                               <div className="w-full h-full bg-white flex flex-col items-center justify-center">
                                   <Icon name="FileText" className="w-8 h-8 text-emerald-500" />
                                   <span className="text-[9px] font-bold text-gray-500 mt-1">PDF</span>
                               </div>
                             ) : (
                               <img src={img} alt="Audit Preview" className="h-full object-cover w-full" />
                             )}
                             {!isSubmittingTECO && (
                               <button type="button" onClick={() => setAuditImages(auditImages.filter((_, i) => i !== imgIdx))} className="absolute top-1.5 right-1.5 bg-red-500 text-white p-1 rounded-full shadow-lg opacity-100 transition active:scale-95">
                                 <Icon name="X" className="w-3 h-3" />
                               </button> 
                             )}
                           </div>
                         ))}
                         {auditImages.length < 5 && !isSubmittingTECO && (
                           <label className="border-2 border-dashed border-emerald-300 bg-emerald-50/50 hover:bg-emerald-100 cursor-pointer rounded-xl flex flex-col items-center justify-center transition w-20 h-20 sm:w-24 sm:h-24 shrink-0">
                             <input type="file" multiple accept="image/*,application/pdf" onChange={(e) => {
                               const files = Array.from(e.target.files);
                               if (auditImages.length + files.length > 5) { alert("แนบเอกสารปิดงานได้สูงสุด 5 ไฟล์"); return; }
                               files.forEach(file => {
                                 const reader = new FileReader();
                                 reader.onloadend = () => setAuditImages(prev => [...prev, reader.result]);
                                 reader.readAsDataURL(file);
                               });
                             }} className="hidden" />
                             <Icon name="Camera" className="w-6 h-6 text-emerald-500 mb-1" />
                             <span className="text-[10px] font-bold text-emerald-600">เพิ่มไฟล์</span>
                           </label>
                         )}
                       </div>
                     </div>
                   </div>
                   {/* Footer */}
                   <div className="p-5 bg-white border-t border-emerald-100 flex gap-3 justify-end items-center">
                     <button disabled={isSubmittingTECO} onClick={() => { setTecoModalJob(null); setAuditImages([]); }} className="px-5 py-3 rounded-xl font-bold text-gray-500 bg-gray-100 hover:bg-gray-200 transition text-sm disabled:opacity-50">ยกเลิก</button>
                     <button onClick={handleCloseJobTECO} disabled={isSubmittingTECO} className="px-6 py-3 rounded-xl font-black text-white bg-emerald-500 hover:bg-emerald-600 shadow-lg shadow-emerald-200 transition-all flex items-center gap-2 active:scale-95 disabled:opacity-70 text-sm sm:text-base">
                       {isSubmittingTECO ? <Icon name="Loader" className="w-5 h-5 animate-spin" /> : <Icon name="Check" className="w-5 h-5" />}
                       {isSubmittingTECO ? 'กำลังบันทึก...' : 'บันทึกปิดงาน'}
                     </button>
                   </div>
                 </div>
               </div>, 
               document.body
            )}
          </div>
        );
      };

      const AdminDashboard = UserDashboard;

      // ==========================================
      // 💡 1. คอมโพเนนต์หน้า กราฟสรุปสถิติ
      // ==========================================
      const AnalyticsDashboard = ({ jobs }) => {
        const stats = useMemo(() => {
          const safeJobs = Array.isArray(jobs) ? jobs : [];
          return {
            total: safeJobs.length,
            new: safeJobs.filter(j => getSafeStatus(j.status) === 'งานใหม่').length,
            received: safeJobs.filter(j => getSafeStatus(j.status) === 'รับเรื่อง').length,
            proposed: safeJobs.filter(j => getSafeStatus(j.status) === 'อนุมัติแล้ว').length,
            assigned: safeJobs.filter(j => getSafeStatus(j.status) === 'จ่ายงานแล้ว').length,
            sap: safeJobs.filter(j => getSafeStatus(j.status) === 'สับเปลี่ยน SAP แล้ว').length,
            teco: safeJobs.filter(j => getSafeStatus(j.status) === 'ปิดงาน (TECO)').length,
            cancelled: safeJobs.filter(j => getSafeStatus(j.status) === 'ยกเลิก').length,
          };
        }, [jobs]);

        return (
          <div className="w-full pb-4 animate-fade-in h-full mt-2">
             <StatsPieChart stats={stats} jobs={jobs} />
             <JobMap jobs={jobs} />
          </div>
        );
      };

      // ==========================================
      // 💡 2. คอมโพเนนต์หน้า ประวัติ
      // ==========================================
      const HistoryDashboard = () => {
        const [logs, setLogs] = useState([]);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
          if (typeof google !== 'undefined' && google.script) {
            google.script.run.withSuccessHandler(data => {
              setLogs(data); setLoading(false);
            }).getLogs();
          } else { setLoading(false); }
        }, []);
        
        return (
          <div className="w-full pb-4 animate-fade-in">
            <div className="mb-6"><h2 className="text-xl sm:text-3xl font-black text-[#5F259F] tracking-tight uppercase">ประวัติการทำรายการ (System Logs)</h2></div>
            <div className="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden relative">
              {loading ? ( <div className="h-64 flex flex-col items-center justify-center"><Icon name="Loader" className="w-8 h-8 animate-spin text-[#5F259F]" /></div> ) : (
                 <div className="overflow-x-auto max-h-[65vh]">
                   <table className="w-full text-left border-collapse min-w-[800px]">
                     <thead className="bg-[#F3E8FF] border-b border-purple-200 sticky top-0">
                       <tr><th className="px-4 py-4 text-sm font-bold text-black uppercase w-48">วันเวลา</th><th className="px-4 py-4 text-sm font-bold text-black uppercase w-48">การทำรายการ</th><th className="px-4 py-4 text-sm font-bold text-black uppercase">รายละเอียด</th></tr>
                     </thead>
                     <tbody className="divide-y divide-gray-50">
                       {logs.length > 0 ? logs.map((log, idx) => ( <tr key={idx} className="hover:bg-purple-50 transition-colors text-sm"><td className="px-4 py-3 whitespace-nowrap text-gray-600">{log.timestamp}</td><td className="px-4 py-3 whitespace-nowrap font-bold text-[#5F259F]">{log.action}</td><td className="px-4 py-3 text-gray-800">{log.details}</td></tr> )) : <tr><td colSpan="3" className="p-10 text-center text-gray-400">ไม่มีข้อมูลประวัติ</td></tr>}
                     </tbody>
                   </table>
                 </div>
              )}
            </div>
          </div>
        );
      };

      // ==========================================
      // คอมโพเนนต์หลักตัวแอป (MainApp)
      // ==========================================
      const MainApp = ({ currentUser, setCurrentUser }) => {
        const isAdminUser = getUserRoles(currentUser).includes('Admin');
        const [currentView, setCurrentView] = useState(() => {
           if (getUserRoles(currentUser).includes('Employee')) return 'form';
           return isAdminUser ? 'admin_dashboard' : 'user_dashboard'; 
        });
        const [jobs, setJobs] = useState([]); 
        const [loading, setLoading] = useState(false); 
        const [refreshing, setRefreshing] = useState(false); 
        const [lastUpdated, setLastUpdated] = useState(null);
        const [isExiting, setIsExiting] = useState(false); 

        const fetchJobs = useCallback((isBackground = false) => {
          if (!isBackground) setLoading(true); else setRefreshing(true);
          if (typeof google !== 'undefined' && google.script) {
            google.script.run.withSuccessHandler(data => { setJobs(data); setLastUpdated(new Date()); setLoading(false); setRefreshing(false); }).withFailureHandler(() => { setLoading(false); setRefreshing(false); }).getAdminJobs();
          } else { setTimeout(() => { setJobs([]); setLastUpdated(new Date()); setLoading(false); setRefreshing(false); }, 500); }
        }, []);

        useEffect(() => { fetchJobs(); }, [fetchJobs]);

        const updateStatus = (id, newStatus, data, type) => {
          const currentJob = jobs.find(j => j.id === id);
          if (!currentJob) return;
          
          let durationToSend = currentJob.duration;
          if (type !== 'edit' && type !== 'optimistic') {
             if (newStatus === 'ปิดงาน (TECO)' && currentJob.status !== 'ปิดงาน (TECO)') { 
               durationToSend = calculateTimeElapsed(currentJob.timestamp);
             }
             else if (newStatus !== 'ปิดงาน (TECO)' && currentJob.status === 'ปิดงาน (TECO)') { 
               durationToSend = "";
             }
          }
          
          const previousJobs = [...jobs];
          setJobs(prev => prev.map(j => {
             if (j.id === id) { 
               let localData = { ...data };
               if (localData && Array.isArray(localData.image)) {
                 localData.image = localData.image.join(',');
               }
               
               if (type === 'edit' || type === 'optimistic') return { ...j, ...localData }; 
               else return { ...j, status: newStatus || j.status, duration: durationToSend === "" ? null : durationToSend, ...(localData || {}) }; 
             } 
             return j;
          }));
          
          // 🚀 ถ้าเป็น 'optimistic' ให้หยุดการทำงานแค่นี้ (เปลี่ยนแค่ตาเห็นบนตาราง)
          if (type === 'optimistic') return;
          
          if (typeof google !== 'undefined' && google.script) {
            if (type === 'edit') {
              google.script.run.withSuccessHandler((res) => {
                if (res && !res.success) {
                   alert("อัปเดตไม่สำเร็จ: " + (res.message || "ไม่ทราบสาเหตุ"));
                   setJobs(previousJobs); 
                }
              }).withFailureHandler((err) => { 
                alert("Error: " + err); 
                setJobs(previousJobs); 
              }).updateJobDetails(id, data, currentUser?.name);
            } else {
              let safeCompletionData = null;
              if (data) { safeCompletionData = { ...data }; delete safeCompletionData.files; }
              
              google.script.run.withSuccessHandler((res) => {
                if (res && !res.success) {
                   alert("เปลี่ยนสถานะล้มเหลว: " + (res.message || "ไม่ทราบสาเหตุ"));
                   setJobs(previousJobs); 
                }
              }).withFailureHandler((err) => { 
                alert("Error: " + err); 
                setJobs(previousJobs); 
              }).updateAdminJobStatus(id, newStatus, durationToSend, safeCompletionData, currentUser?.name);
            }
          }
        };

        const handleDeleteJob = (id) => {
            setRefreshing(true);
            const previousJobs = [...jobs];
            setJobs(prev => prev.filter(j => j.id !== id));
            if (typeof google !== 'undefined' && google.script) {
                google.script.run.withSuccessHandler(() => fetchJobs(true))
                .withFailureHandler((err) => { 
                    alert("Error: " + err); setJobs(previousJobs); fetchJobs(true); 
                }).deleteJob(id, currentUser?.name);
            } else {
                setTimeout(() => fetchJobs(true), 1000);
            }
        };

        const handleLogout = () => {
          sessionStorage.removeItem('authUser');
          setCurrentUser(null); 
        };

        return (
          <div className="w-full min-h-screen bg-[#F8FAFC] flex flex-col">
            {isAdminUser ? (
              <header className="w-full bg-gradient-to-r from-[#5F259F] to-[#7A2F8F] text-white shadow-xl sticky top-0 z-40">
                <div className="w-full px-4 lg:px-8 py-2 flex justify-between items-center gap-2">
                  <div className="flex items-center gap-2 cursor-pointer group shrink flex-1 min-w-0" onClick={() => setCurrentView('admin_dashboard')}>
                    <div className="bg-white p-1.5 lg:p-2 rounded-xl shadow-lg group-hover:rotate-12 transition-transform shrink-0">
                      <Icon name="Zap" className="w-5 h-5 lg:w-6 lg:h-6 text-[#5F259F] fill-current" />
                    </div>
                    <div className="flex flex-col min-w-0">
                      <h1 className="text-[13px] md:text-[15px] lg:text-xl font-black italic tracking-tighter uppercase leading-none truncate">PEA MTS</h1>
                      <div className="flex items-center gap-1.5 mt-1">
                        <p className="hidden md:block text-[8px] lg:text-[10px] font-bold text-purple-200 uppercase opacity-90 tracking-widest truncate">Meter Tracking System</p>
                        <span className="bg-amber-400 text-purple-900 px-1.5 rounded-md text-[8px] font-bold shrink-0 truncate max-w-[120px]">{currentUser?.name || 'ไม่ระบุชื่อ'}</span>
                      </div>
                    </div>
                  </div>
                  <nav className="flex bg-black/20 p-1 md:p-1.5 rounded-full md:rounded-2xl backdrop-blur-md items-center shrink-0 max-w-full">
                      <div className="flex md:hidden items-center gap-1 overflow-x-auto no-scrollbar px-1">
                          <button onClick={() => setCurrentView('form')} className={`flex items-center justify-center transition-all h-8 w-8 rounded-full shrink-0 ${currentView === 'form' ? 'bg-white text-[#5F259F]' : 'text-white/80 hover:text-white'}`}><Icon name="PlusCircle" className="w-4 h-4" /></button>
                          <button onClick={() => setCurrentView('search')} className={`flex items-center justify-center transition-all h-8 w-8 rounded-full shrink-0 ${currentView === 'search' ? 'bg-white text-[#5F259F]' : 'text-white/80 hover:text-white'}`}><Icon name="Search" className="w-4 h-4" /></button>
                          <button onClick={() => setCurrentView('admin_dashboard')} className={`flex items-center justify-center transition-all h-8 w-8 rounded-full shrink-0 ${currentView === 'admin_dashboard' ? 'bg-white text-[#5F259F]' : 'text-white/80 hover:text-white'}`}><Icon name="Grid" className="w-4 h-4" /></button>
                          <button onClick={() => setCurrentView('history')} className={`flex items-center justify-center transition-all h-8 w-8 rounded-full shrink-0 ${currentView === 'history' ? 'bg-white text-[#5F259F]' : 'text-white/80 hover:text-white'}`}><Icon name="History" className="w-4 h-4" /></button>
                          <button onClick={() => setCurrentView('analytics')} className={`flex items-center justify-center transition-all h-8 w-8 rounded-full shrink-0 ${currentView === 'analytics' ? 'bg-white text-[#5F259F]' : 'text-white/80 hover:text-white'}`}><Icon name="Chart" className="w-4 h-4" /></button>
                          <div className="w-[1px] h-4 bg-white/20 mx-0.5 shrink-0"></div>
                          <button onClick={handleLogout} className="flex items-center justify-center h-8 w-8 text-red-300 hover:text-white hover:bg-red-500 rounded-full shrink-0"><Icon name="LogOut" className="w-4 h-4" /></button>
                      </div>
                      <div className="hidden md:flex items-center gap-0.5 lg:gap-1.5">
                          <button onClick={() => setCurrentView('form')} className={`px-2 lg:px-4 py-2 rounded-xl text-[10px] lg:text-xs font-bold transition-all flex items-center gap-1 lg:gap-2 ${currentView === 'form' ? 'bg-white text-[#5F259F] shadow-md scale-105' : 'text-purple-100 hover:text-white hover:bg-white/10'}`}><Icon name="PlusCircle" className="w-3.5 h-3.5 lg:w-4 lg:h-4" /> <span className="hidden xl:inline">แจ้งมิเตอร์ชำรุด</span><span className="xl:hidden">แจ้งซ่อม</span></button>
                          <button onClick={() => setCurrentView('search')} className={`px-2 lg:px-4 py-2 rounded-xl text-[10px] lg:text-xs font-bold transition-all flex items-center gap-1 lg:gap-2 ${currentView === 'search' ? 'bg-white text-[#5F259F] shadow-md scale-105' : 'text-purple-100 hover:text-white hover:bg-white/10'}`}><Icon name="Search" className="w-3.5 h-3.5 lg:w-4 lg:h-4" /> <span className="hidden xl:inline">ตรวจสอบข้อมูล</span><span className="xl:hidden">ค้นหา</span></button>
                          <button onClick={() => setCurrentView('admin_dashboard')} className={`px-2 lg:px-4 py-2 rounded-xl text-[10px] lg:text-xs font-bold transition-all flex items-center gap-1 lg:gap-2 ${currentView === 'admin_dashboard' ? 'bg-white text-[#5F259F] shadow-md scale-105' : 'text-purple-100 hover:text-white hover:bg-white/10'}`}><Icon name="Grid" className="w-3.5 h-3.5 lg:w-4 lg:h-4" /> รายการแจ้งซ่อม</button>
                          <button onClick={() => setCurrentView('history')} className={`px-2 lg:px-4 py-2 rounded-xl text-[10px] lg:text-xs font-bold transition-all flex items-center gap-1 lg:gap-2 ${currentView === 'history' ? 'bg-white text-[#5F259F] shadow-md scale-105' : 'text-purple-100 hover:text-white hover:bg-white/10'}`}><Icon name="History" className="w-3.5 h-3.5 lg:w-4 lg:h-4" /> ประวัติ</button>
                          <button onClick={() => setCurrentView('analytics')} className={`px-2 lg:px-4 py-2 rounded-xl text-[10px] lg:text-xs font-bold transition-all flex items-center gap-1 lg:gap-2 ${currentView === 'analytics' ? 'bg-white text-[#5F259F] shadow-md scale-105' : 'text-purple-100 hover:text-white hover:bg-white/10'}`}><Icon name="Chart" className="w-3.5 h-3.5 lg:w-4 lg:h-4" /> สถิติ</button>
                          <a href="https://docs.google.com/spreadsheets/d/1HTYdfH8rQxII3Qt2m8Wja2SLk3W-rt_DPzQ1g7aeH3U/edit?gid=356664083#gid=356664083" target="_blank" rel="noopener noreferrer" className="px-2 lg:px-4 py-2 rounded-xl text-[10px] lg:text-xs font-bold transition-all flex items-center gap-1 lg:gap-2 text-emerald-300 hover:text-emerald-100 hover:bg-white/10"><Icon name="FileText" className="w-3.5 h-3.5 lg:w-4 lg:h-4" /> Sheets</a>
                          <div className="w-[1px] h-5 bg-white/20 mx-1"></div>
                          <div className="px-1 lg:px-2 flex items-center gap-1.5 lg:gap-2">
                             <div className="w-6 h-6 lg:w-7 lg:h-7 rounded-full bg-purple-300 flex items-center justify-center text-[#5F259F] font-black text-[10px] lg:text-xs">{currentUser?.name ? currentUser.name.charAt(0) : 'U'}</div>
                             <div className="hidden lg:block text-[10px] xl:text-xs font-bold truncate max-w-[80px] xl:max-w-[120px]">{currentUser?.name || 'Unknown'}</div>
                          </div>
                          <button onClick={handleLogout} disabled={isExiting} className="p-1.5 lg:p-2 rounded-xl text-xs font-bold transition-all flex items-center gap-2 text-red-300 hover:text-red-100 hover:bg-red-500/20 disabled:opacity-50"><Icon name="LogOut" className="w-4 h-4 lg:w-5 lg:h-5" /></button>
                      </div>
                  </nav>
                </div>
              </header>
            ) : (
              <header className="w-full bg-gradient-to-r from-[#5F259F] to-[#7A2F8F] text-white shadow-xl sticky top-0 z-40">
                <div className="w-full px-4 sm:px-8 py-2 sm:py-3.5 flex justify-between items-center gap-1 sm:gap-4">
                  <div className="flex items-center gap-1.5 sm:gap-3 cursor-pointer group shrink-0" onClick={() => setCurrentView('user_dashboard')}>
                    <div className="bg-white p-1 sm:p-2 rounded-xl sm:rounded-2xl shadow-lg group-hover:rotate-12 transition-transform">
                      <Icon name="Zap" className="w-5 h-5 sm:w-7 sm:h-7 text-[#5F259F] fill-current" />
                    </div>
                    <div className="flex flex-col">
                      <h1 className="text-[16px] sm:text-xl font-black italic tracking-tighter uppercase leading-none whitespace-nowrap">PEA MTS</h1>
                      <div className="flex items-center gap-1 sm:gap-2 mt-0.5 sm:mt-1">
                        <p className="text-[8px] sm:text-[10px] font-bold text-purple-200 uppercase opacity-90 tracking-widest whitespace-nowrap">Meter Tracking System</p>
                        <span className="bg-amber-400 text-purple-900 px-1 sm:px-1.5 rounded-sm sm:rounded text-[6px] sm:text-[8px] font-bold truncate max-w-[80px] sm:max-w-[120px]">{currentUser?.name || 'ไม่ระบุชื่อ'}</span>
                      </div>
                    </div>
                  </div>
                  
                  <nav className="flex bg-black/20 p-1 sm:p-1.5 rounded-full md:rounded-2xl backdrop-blur-md items-center gap-1 sm:gap-2 shrink-0 overflow-x-auto no-scrollbar max-w-[60%] sm:max-w-none">
                      <div className="flex md:hidden items-center gap-1 sm:gap-1.5">
                          <button onClick={() => setCurrentView('form')} className={`flex items-center justify-center transition-all h-9 w-9 sm:h-10 sm:w-12 rounded-full ${currentView === 'form' ? 'bg-white text-[#5F259F] shadow-md scale-110' : 'text-white/80 hover:text-white hover:bg-white/10'}`}><Icon name="PlusCircle" className="w-[18px] h-[18px] sm:w-5 sm:h-5" /></button>
                          <button onClick={() => setCurrentView('search')} className={`flex items-center justify-center transition-all h-9 w-9 sm:h-10 sm:w-12 rounded-full ${currentView === 'search' ? 'bg-white text-[#5F259F] shadow-md scale-110' : 'text-white/80 hover:text-white hover:bg-white/10'}`}><Icon name="Search" className="w-[18px] h-[18px] sm:w-5 sm:h-5" /></button>
                          <button onClick={() => setCurrentView('user_dashboard')} className={`flex items-center justify-center transition-all h-9 w-9 sm:h-10 sm:w-12 rounded-full ${currentView === 'user_dashboard' ? 'bg-white text-[#5F259F] shadow-md scale-110' : 'text-white/80 hover:text-white hover:bg-white/10'}`}><Icon name="Grid" className="w-[18px] h-[18px] sm:w-5 sm:h-5" /></button>
                          <button onClick={() => setCurrentView('analytics')} className={`flex items-center justify-center transition-all h-9 w-9 sm:h-10 sm:w-12 rounded-full ${currentView === 'analytics' ? 'bg-white text-[#5F259F] shadow-md scale-110' : 'text-white/80 hover:text-white hover:bg-white/10'}`}><Icon name="Chart" className="w-[18px] h-[18px] sm:w-5 sm:h-5" /></button>
                          <div className="w-[1px] h-5 bg-white/20 mx-1"></div>
                          <button onClick={handleLogout} className="flex items-center justify-center h-9 w-9 sm:h-10 sm:w-10 text-red-300 hover:text-white hover:bg-red-500 rounded-full transition-all"><Icon name="LogOut" className="w-[18px] h-[18px] sm:w-5 sm:h-5" /></button>
                      </div>

                      <div className="hidden md:flex items-center">
                          <button onClick={() => setCurrentView('form')} className={`px-4 lg:px-5 py-2.5 rounded-xl text-xs font-bold transition-all whitespace-nowrap flex items-center gap-2 ${currentView === 'form' ? 'bg-white text-[#5F259F] shadow-lg scale-105' : 'text-purple-100 hover:text-white'}`}><Icon name="PlusCircle" className="w-4 h-4" /> แจ้งมิเตอร์ชำรุด</button>
                          <button onClick={() => setCurrentView('search')} className={`px-4 lg:px-5 py-2.5 rounded-xl text-xs font-bold transition-all whitespace-nowrap flex items-center gap-2 ${currentView === 'search' ? 'bg-white text-[#5F259F] shadow-lg scale-105' : 'text-purple-100 hover:text-white'}`}><Icon name="Search" className="w-4 h-4" /> ตรวจสอบข้อมูล</button>
                          <button onClick={() => setCurrentView('user_dashboard')} className={`px-4 lg:px-5 py-2.5 rounded-xl text-xs font-bold transition-all whitespace-nowrap flex items-center gap-2 ${currentView === 'user_dashboard' ? 'bg-white text-[#5F259F] shadow-lg scale-105' : 'text-purple-100 hover:text-white'}`}><Icon name="Grid" className="w-4 h-4" /> รายการแจ้งซ่อม</button>
                          <button onClick={() => setCurrentView('analytics')} className={`px-4 lg:px-5 py-2.5 rounded-xl text-xs font-bold transition-all whitespace-nowrap flex items-center gap-2 ${currentView === 'analytics' ? 'bg-white text-[#5F259F] shadow-lg scale-105' : 'text-purple-100 hover:text-white'}`}><Icon name="Chart" className="w-4 h-4" /> Dashboard</button>
                          <div className="w-[1px] h-6 bg-white/20 mx-1"></div>
                          <div className="px-4 flex items-center gap-2">
                             <div className="w-8 h-8 rounded-full bg-purple-300 flex items-center justify-center text-[#5F259F] font-black">{currentUser?.name ? currentUser.name.charAt(0) : 'U'}</div>
                             <div className="hidden lg:block text-xs font-bold">{currentUser?.name || 'Unknown'}</div>
                          </div>
                          <button onClick={handleLogout} disabled={isExiting} className="px-3 py-2.5 rounded-xl text-xs font-bold transition-all whitespace-nowrap flex items-center gap-2 text-red-300 hover:text-red-100 hover:bg-white/10 disabled:opacity-50"><Icon name="LogOut" className="w-4 h-4" /></button>
                      </div>
                  </nav>
                </div>
              </header>
            )}

            <main className="max-w-[1400px] w-full mx-auto px-4 pt-6 pb-4 flex-grow relative">
              {currentView === 'form' && ( 
                <div className="animate-fade-in w-full">
                  <div className="max-w-md mx-auto mb-6 text-center">
                    <h2 className="text-3xl font-black text-[#5F259F] mb-1">แจ้งมิเตอร์ชำรุด</h2>
                  </div>
                  <div className="max-w-5xl mx-auto w-full">
                    <MeterReportForm jobs={jobs} onSubmit={() => fetchJobs(true)} onViewDashboard={() => setCurrentView(isAdminUser ? 'admin_dashboard' : 'user_dashboard')} currentUser={currentUser} />
                  </div>
                </div> 
              )}
              
              {/* 💡 แก้ไขบรรทัดนี้: ต้องส่ง Props เข้าไปให้ CustomerCheckView ด้วยครับ */}
              {currentView === 'search' && (
                <CustomerCheckView 
                   jobs={jobs} 
                   currentUser={currentUser} 
                   onStatusChange={updateStatus} 
                   onRefresh={() => fetchJobs(true)} 
                />
              )}
              
              {currentView === 'user_dashboard' && !isAdminUser && ( 
                <div className="animate-fade-in w-full h-full">
                  {loading && jobs.length === 0 ? ( <div className="h-96 flex flex-col items-center justify-center gap-4"><div className="w-12 h-12 border-4 border-purple-100 border-t-[#5F259F] rounded-full animate-spin"></div><p className="text-[#5F259F] font-bold text-sm animate-pulse tracking-widest">กำลังดึงข้อมูล...</p></div> ) 
                  : <UserDashboard jobs={jobs} onRefresh={() => fetchJobs(true)} isRefreshing={refreshing || loading} lastUpdated={lastUpdated} currentUser={currentUser} onStatusChange={updateStatus} onDeleteJob={handleDeleteJob} />}
                </div> 
              )}
              
              {isAdminUser && currentView === 'admin_dashboard' && ( loading && jobs.length === 0 ? ( <div className="h-96 flex flex-col items-center justify-center gap-4"><div className="w-12 h-12 border-4 border-purple-100 border-t-[#5F259F] rounded-full animate-spin"></div><p className="text-[#5F259F] font-bold text-sm animate-pulse tracking-widest">กำลังดึงข้อมูลรายการแจ้งซ่อม...</p></div> ) : <AdminDashboard jobs={jobs} onStatusChange={updateStatus} onRefresh={() => fetchJobs(true)} isRefreshing={refreshing || loading} lastUpdated={lastUpdated} currentUser={currentUser} onDeleteJob={handleDeleteJob} /> )}
              {isAdminUser && currentView === 'history' && <HistoryDashboard />}
              {currentView === 'analytics' && ( loading && jobs.length === 0 ? ( <div className="h-96 flex flex-col items-center justify-center gap-4"><div className="w-12 h-12 border-4 border-purple-100 border-t-[#5F259F] rounded-full animate-spin"></div><p className="text-[#5F259F] font-bold text-sm animate-pulse tracking-widest">กำลังคำนวณสถิติ...</p></div> ) : <AnalyticsDashboard jobs={jobs} /> )}
            </main>

            <footer className="text-center py-4 text-gray-600 text-[8px] uppercase tracking-[0.2em] bg-gray-100 border-t border-gray-200 w-full mt-auto">
              © 2026 FAST TRACK PEA KPN ©
            </footer>
          </div>
        );
      }

      // ==========================================
      // คอมโพเนนต์ตรวจสอบการ Login ก่อนเข้าใช้งาน
      // ==========================================
      const App = () => {
        const [currentUser, setCurrentUser] = useState(() => {
           const saved = sessionStorage.getItem('authUser');
           return saved ? JSON.parse(saved) : null;
        });

        if (!currentUser) {
           return <LoginScreen onLoginSuccess={(user) => setCurrentUser(user)} />;
        }

        return <MainApp currentUser={currentUser} setCurrentUser={setCurrentUser} />;
      };
      
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
  </body>
</html>
