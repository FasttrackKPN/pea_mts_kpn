                          {auditImages.length < 5 && !isSubmittingTECO && (
                            <label className="border-2 border-dashed border-emerald-300 bg-emerald-50/50 hover:bg-emerald-100 cursor-pointer rounded-xl flex flex-col items-center justify-center transition w-20 h-20 sm:w-24 sm:h-24 shrink-0">
                              <input type="file" multiple accept="image/*,application/pdf" onChange={(e) => {
                                const files = Array.from(e.target.files);
                                if (auditImages.length + files.length > 5) { alert("แนบเอกสารปิดงานได้สูงสุด 5 ไฟล์"); return; }
                                files.forEach(file => {
                                  const reader = new FileReader();
                                  reader.onloadend = () => setAuditImages(prev => [...prev, reader.result]);
                                  reader.readAsDataURL(file);
                                });
                              }} className="hidden" />
                              <Icon name="Camera" className="w-6 h-6 text-emerald-500 mb-1" />
                              <span className="text-[10px] font-bold text-emerald-600">เพิ่มไฟล์</span>
                            </label>
                          )}
                        </div>
                      </div>
                    </div>

                    {/* Footer */}
                    <div className="p-5 bg-white border-t border-emerald-100 flex gap-3 justify-end items-center">
                      <button disabled={isSubmittingTECO} onClick={() => { setTecoModalJob(null); setAuditImages([]); }} className="px-5 py-3 rounded-xl font-bold text-gray-500 bg-gray-100 hover:bg-gray-200 transition text-sm disabled:opacity-50">
                        ยกเลิก
                      </button>
                      <button onClick={handleCloseJob} disabled={isSubmittingTECO} className="px-6 py-3 rounded-xl font-black text-white bg-emerald-500 hover:bg-emerald-600 shadow-lg shadow-emerald-200 transition-all flex items-center gap-2 active:scale-95 disabled:opacity-70 text-sm sm:text-base">
                        {isSubmittingTECO ? <Icon name="Loader" className="w-5 h-5 animate-spin" /> : <Icon name="Check" className="w-5 h-5" />}
                        {isSubmittingTECO ? 'กำลังบันทึกและอัปโหลด...' : 'ยืนยันการปิดงาน'}
                      </button>
                    </div>
                  </div>
                </div>, 
                document.body
             )}
          </div>
        );
      };

      const CustomCombobox = ({ label, value, onChange, options, placeholder, inputRef, className="", labelClassName="text-[11px] text-gray-500 uppercase tracking-wider font-bold block mb-1", disabled=false }) => {
        const [isOpen, setIsOpen] = useState(false);
        const uniqueOptions = React.useMemo(() => { if (!options) return []; return [...new Set(options.map(opt => String(opt).trim()).filter(Boolean))]; }, [options]);
        const [filteredOptions, setFilteredOptions] = useState(uniqueOptions);
        const wrapperRef = React.useRef(null);
        
        useEffect(() => { if (!value) setFilteredOptions(uniqueOptions); else setFilteredOptions(uniqueOptions.filter(opt => opt.toLowerCase().includes(value.toLowerCase()))); }, [value, uniqueOptions]);
        useEffect(() => { function handleClickOutside(event) { if (wrapperRef.current && !wrapperRef.current.contains(event.target)) setIsOpen(false); } document.addEventListener("mousedown", handleClickOutside); return () => document.removeEventListener("mousedown", handleClickOutside); }, [wrapperRef]);
        
        return (
          <div className="relative" ref={wrapperRef}>
            <label className={labelClassName}>{label}</label>
            <div className="relative">
              <input disabled={disabled} ref={inputRef} type="text" value={value} onChange={(e) => { onChange(e.target.value); setIsOpen(true); }} onFocus={() => setIsOpen(true)} placeholder={placeholder} className={className || "w-full p-2.5 bg-white border border-purple-300 rounded-lg text-sm font-bold text-black outline-none focus:ring-2 focus:ring-[#5F259F] transition-shadow disabled:bg-gray-100 disabled:text-gray-400 disabled:border-gray-200 disabled:cursor-not-allowed"} />
            </div>
            {isOpen && !disabled && filteredOptions.length > 0 && (
              <ul className="absolute z-[100] w-full mt-1 bg-white border border-purple-200 rounded-xl shadow-xl max-h-48 overflow-y-auto">
                {filteredOptions.map((opt, idx) => (<li key={idx} onClick={() => { onChange(opt); setIsOpen(false); }} className="px-4 py-3 text-base text-gray-700 hover:bg-purple-50 cursor-pointer border-b border-gray-100 last:border-0 transition-colors">{opt}</li>))}
              </ul>
            )}
          </div>
        );
      };

      const EmployeeCombobox = ({ label, value, onChange, options, placeholder, inputRef, className="", labelClassName="text-[11px] text-gray-500 uppercase tracking-wider font-bold block mb-1", disabled=false }) => {
        const [isOpen, setIsOpen] = useState(false);
        const [displayValue, setDisplayValue] = useState('');
        const uniqueOptions = React.useMemo(() => { if (!options) return []; return [...new Set(options.map(opt => String(opt).trim()).filter(Boolean))]; }, [options]);
        const [filteredOptions, setFilteredOptions] = useState(uniqueOptions);
        const wrapperRef = React.useRef(null);
        
        useEffect(() => { if (!value) setDisplayValue(''); else setDisplayValue(value); }, [value]);
        useEffect(() => { if (!displayValue) setFilteredOptions(uniqueOptions); else setFilteredOptions(uniqueOptions.filter(opt => opt.toLowerCase().includes(displayValue.toLowerCase()))); }, [displayValue, uniqueOptions]);
        useEffect(() => { function handleClickOutside(event) { if (wrapperRef.current && !wrapperRef.current.contains(event.target)) setIsOpen(false); } document.addEventListener("mousedown", handleClickOutside); return () => document.removeEventListener("mousedown", handleClickOutside); }, [wrapperRef]);
        
        const handleSelect = (opt) => { setDisplayValue(opt); const parts = opt.trim().split(/\s+/); if (parts.length > 1 && /^\d+$/.test(parts[0])) { onChange(parts.slice(1).join(' ')); } else { onChange(opt); } setIsOpen(false); };
        
        return (
          <div className="relative" ref={wrapperRef}>
            <label className={labelClassName}>{label}</label>
            <div className="relative">
              <input disabled={disabled} ref={inputRef} type="text" value={displayValue} onChange={(e) => { setDisplayValue(e.target.value); onChange(e.target.value); setIsOpen(true); }} onFocus={() => setIsOpen(true)} placeholder={placeholder} className={className || "w-full p-2.5 bg-white border border-purple-300 rounded-lg text-sm font-bold text-black outline-none focus:ring-2 focus:ring-[#5F259F] transition-shadow disabled:bg-gray-100 disabled:text-gray-400 disabled:border-gray-200 disabled:cursor-not-allowed"} />
            </div>
            {isOpen && !disabled && filteredOptions.length > 0 && (
              <ul className="absolute z-[100] w-full mt-1 bg-white border border-gray-200 rounded-xl shadow-xl max-h-48 overflow-y-auto">
                {filteredOptions.map((opt, idx) => { const parts = opt.split(' '); const hasId = parts.length > 1 && /^\d+$/.test(parts[0]); return (<li key={idx} onClick={() => handleSelect(opt)} className="px-4 py-3 hover:bg-purple-50 cursor-pointer border-b border-gray-100 last:border-0 transition-colors flex items-center gap-2">{hasId ? (<><span className="font-light text-base text-gray-500">{parts[0]}</span><span className="font-medium text-base text-gray-700">{parts.slice(1).join(' ')}</span></>) : (<span className="font-medium text-base text-gray-700">{opt}</span>)}</li>); })}
              </ul>
            )}
          </div>
        );
      };

      const MeterReportForm = ({ jobs, onSubmit, onViewDashboard, currentUser }) => {
        const [formData, setFormData] = useState(() => { 
          const saved = sessionStorage.getItem('reportFormData'); 
          const defaultName = currentUser ? currentUser.name : '';
          return saved ? { ...JSON.parse(saved), status: 'งานใหม่', reporterName: defaultName } : { meterId: '', caNo: '', cause: '', defectReason: '', lat: '', lng: '', note: '', reporterName: defaultName, status: 'งานใหม่' }; 
        });
        const [meterSearchStatus, setMeterSearchStatus] = useState(() => formData.meterId ? 'found' : 'idle');
        const [caSearchStatus, setCaSearchStatus] = useState(() => formData.caNo ? 'found' : 'idle');
        const [images, setImages] = useState([]);
        const [status, setStatus] = useState('idle'); const [gpsLoading, setGpsLoading] = useState(false); const [alertMsg, setAlertMsg] = useState(null); const [autoFillingMeter, setAutoFillingMeter] = useState(false);
        const [autoFillingCA, setAutoFillingCA] = useState(false); const [errorField, setErrorField] = useState(null);
        const locationRef = useRef(null); const meterRef = useRef(null);
        const causeRef = useRef(null); const reporterRef = useRef(null);
        const [fetchedCauses, setFetchedCauses] = useState([]); const [fetchedReasons, setFetchedReasons] = useState([]);
        const [employees, setEmployees] = useState([]);

        useEffect(() => { 
          sessionStorage.setItem('reportFormData', JSON.stringify(formData)); 
        }, [formData]);

        const clearForm = () => { 
  setFormData({ meterId: '', caNo: '', cause: '', defectReason: '', lat: '', lng: '', note: '', reporterName: currentUser ? currentUser.name : '', status: 'งานใหม่', duration: '-' }); // 🚀 ใส่ duration: '-'
  setImages([]); setMeterSearchStatus('idle'); setCaSearchStatus('idle'); sessionStorage.removeItem('reportFormData');
};
        
        useEffect(() => { if (typeof google !== 'undefined' && google.script) { google.script.run.withSuccessHandler(res => { if(res) { setFetchedCauses(res.causes || []); setFetchedReasons(res.reasons || []); } }).getUniqueOptions(); google.script.run.withSuccessHandler(res => { if(res && res.length > 0) setEmployees(res); }).getEmployees(); } }, []);

        const sortedEmployees = useMemo(() => { if (!employees || employees.length === 0) return []; const freqs = {}; if (jobs && jobs.length > 0) { jobs.forEach(j => { const name = String(j.reporterName || '').trim(); if(name && name !== '-') freqs[name] = (freqs[name] || 0) + 1; }); } return [...employees].sort((a, b) => { const partsA = a.trim().split(/\s+/); const partsB = b.trim().split(/\s+/); const nameA = partsA.length > 1 && /^\d+$/.test(partsA[0]) ? partsA.slice(1).join(' ') : a.trim(); const nameB = partsB.length > 1 && /^\d+$/.test(partsB[0]) ? partsB.slice(1).join(' ') : b.trim(); return (freqs[nameB] || 0) - (freqs[nameA] || 0); }); }, [employees, jobs]);
        const sortedCauses = useMemo(() => { const freqs = {}; if (jobs && jobs.length > 0) { jobs.forEach(j => { const val = String(j.cause || '').trim(); if(val && val !== '-') freqs[val] = (freqs[val] || 0) + 1; }); } const combined = [...new Set([...CAUSE_OPTIONS, ...fetchedCauses].map(o => String(o).trim()).filter(Boolean))]; return combined.sort((a, b) => (freqs[b] || 0) - (freqs[a] || 0)); }, [fetchedCauses, jobs]);
        const sortedDefectReasons = useMemo(() => { const freqs = {}; if (jobs && jobs.length > 0) { jobs.forEach(j => { const val = String(j.defectReason || '').trim(); if(val && val !== '-') freqs[val] = (freqs[val] || 0) + 1; }); } const combined = [...new Set([...DEFECT_REASON_OPTIONS, ...fetchedReasons].map(o => String(o).trim()).filter(Boolean))]; return combined.sort((a, b) => (freqs[b] || 0) - (freqs[a] || 0)); }, [fetchedReasons, jobs]);

        const triggerMeterFetch = (mId) => { setAutoFillingMeter(true); setMeterSearchStatus('loading'); if (typeof google !== 'undefined' && google.script) { google.script.run.withSuccessHandler(res => { setAutoFillingMeter(false); if (res.found && (res.caNo || res.ca)) { setFormData(prev => ({ ...prev, caNo: res.caNo || res.ca })); setMeterSearchStatus('found'); setCaSearchStatus('found'); } else { setMeterSearchStatus('not_found'); } }).withFailureHandler(() => { setAutoFillingMeter(false); setMeterSearchStatus('not_found'); }).searchCustomerFull(mId); } else { setTimeout(() => { setAutoFillingMeter(false); setMeterSearchStatus('not_found'); }, 800); } };
        const triggerCAFetch = (ca) => { setAutoFillingCA(true); setCaSearchStatus('loading'); if (typeof google !== 'undefined' && google.script) { google.script.run.withSuccessHandler(res => { setAutoFillingCA(false); if (res.found && res.meterId) { setFormData(prev => ({ ...prev, meterId: res.meterId })); setCaSearchStatus('found'); setMeterSearchStatus('found'); } else { setCaSearchStatus('not_found'); } }).withFailureHandler(() => { setAutoFillingCA(false); setCaSearchStatus('not_found'); }).searchCustomerFull(ca); } else { setTimeout(() => { setAutoFillingCA(false); setCaSearchStatus('not_found'); }, 800); } };

        const handleMeterChange = (e) => { 
          const val = e.target.value.replace(/\D/g, '').slice(0, 10);
          setFormData(prev => ({...prev, meterId: val})); 
          
          if (val.length === 0) { 
            setMeterSearchStatus('idle');
            setCaSearchStatus('idle'); 
          } else { 
            setMeterSearchStatus('idle');
            if ((val.length === 8 || val.length === 10) && !autoFillingCA && !autoFillingMeter) { 
              clearTimeout(window.meterSearchTimer);
              window.meterSearchTimer = setTimeout(() => {
                triggerMeterFetch(val); 
              }, 500);
            } 
          } 
        };

        const handleCAChange = (e) => { let val = e.target.value.replace(/\D/g, ''); if (val.startsWith('0')) val = val.replace(/^0+/, ''); val = val.slice(0, 11); setFormData(prev => ({...prev, caNo: val})); if (val.length === 0) { setCaSearchStatus('idle'); setMeterSearchStatus('idle'); } else { setCaSearchStatus('idle'); if (val.length === 11 && !autoFillingMeter && !autoFillingCA) { triggerCAFetch(val); } } };

        const getLocation = () => { setGpsLoading(true); if (!navigator.geolocation) { setAlertMsg("อุปกรณ์ของท่านไม่รองรับการระบุพิกัด"); setGpsLoading(false); return; } const handleSuccess = (pos) => { setFormData(prev => ({ ...prev, lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6) })); setGpsLoading(false); }; const handleError = (error) => { navigator.geolocation.getCurrentPosition(handleSuccess, (finalErr) => { 
           let msg = "ไม่สามารถดึงพิกัดได้"; 
           switch(finalErr.code) { 
             case finalErr.PERMISSION_DENIED: 
               msg = "⚠️ เบราว์เซอร์หรือแอปบล็อกการเข้าถึง GPS\n\nวิธีแก้: หากคุณเปิดผ่านแอป LINE หรือฝังในเว็บ ให้กดปุ่ม 'เปิดในเบราว์เซอร์ (Open in Safari/Chrome)' หรืออนุญาต Location ก่อนครับ"; 
               break; 
             case finalErr.POSITION_UNAVAILABLE: 
               msg = "ไม่พบสัญญาณ GPS กรุณาตรวจสอบการตั้งค่ามือถือ"; 
               break; 
             case finalErr.TIMEOUT: 
               msg = "หมดเวลาค้นหาพิกัด สัญญาณอาจอ่อนเกินไป"; 
               break; 
             default: 
               msg = "เกิดข้อผิดพลาด: " + finalErr.message; 
           } 
           setAlertMsg(msg); 
           setGpsLoading(false); 
        }, { enableHighAccuracy: false, timeout: 10000, maximumAge: Infinity }); }; try { navigator.geolocation.getCurrentPosition(handleSuccess, handleError, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }); } catch (e) { setAlertMsg("Error GPS: " + e.message); setGpsLoading(false); } };

        const showError = (ref, fieldName) => { setErrorField(fieldName); if (ref && ref.current) { ref.current.scrollIntoView({ behavior: 'smooth', block: 'center' }); if (ref.current.focus) ref.current.focus(); } setTimeout(() => setErrorField(null), 1000); };

        const handleSubmit = async (e) => { 
          e.preventDefault(); 
          
          // 🔴 ดักจับขั้นเด็ดขาด: ห้ามระบุเหตุผลว่างเปล่า, ห้ามพิมพ์แค่ช่องว่าง หรือขีด (-)
          if (formData.status === 'ยกเลิก') {
             const reasonClean = String(formData.cancelReason || '').trim();
             if (reasonClean === '' || reasonClean === '-') {
                setAlertMsg('⚠️ ไม่สามารถบันทึกได้!\n\nกรุณาระบุเหตุผลในการยกเลิกใบงานนี้ให้ชัดเจน ก่อนทำการกดปุ่มบันทึกข้อมูล');
                return; // หยุดและยกเลิกกระบวนการเซฟทันที
             }
          }
          
          // 💡 2. เช็คเงื่อนไข Audit: ถ้าจะปิดงาน (TECO) ต้องมีรูปปิดงานอย่างน้อย 1 รูป
          
          // 1. เช็คข้อมูลบังคับกรอก
          if (!formData.lat || !formData.lng) { if (locationRef) showError(locationRef, 'location'); return; } 
          if (!formData.meterId) { if (meterRef) showError(meterRef, 'meterId'); return; } 
          if (!formData.cause) { if (causeRef) showError(causeRef, 'cause'); return; } 
          if (!formData.reporterName) { if (reporterRef) showError(reporterRef, 'reporterName'); return; } 
          
          // 2. ตรวจสอบงานซ้ำหน้าบ้าน (แก้ไขบั๊ก getSafeStatus ที่ทำให้ปุ่มนิ่ง)
          if (typeof jobs !== 'undefined' && jobs && jobs.length > 0) {
             const duplicateJob = jobs.find(j => {
                const currentStatus = j.status ? String(j.status).trim() : '';
                return String(j.meterId).trim() === String(formData.meterId).trim() && 
                       currentStatus !== 'ปิดงาน (TECO)' && 
                       currentStatus !== 'ยกเลิก';
             });
             if (duplicateJob) {
                if (typeof setAlertMsg === 'function') setAlertMsg(`ไม่สามารถแจ้งงานซ้ำได้!\nหมายเลขมิเตอร์ (PEA) : ${formData.meterId}\nกำลังดำเนินการอยู่ในใบงาน : ${duplicateJob.jobNo}`);
                if (meterRef) showError(meterRef, 'meterId'); 
                return; 
             }
          }

          // 🚀 3. สั่งให้หน้าจอโชว์ "บันทึกสำเร็จ" ทันทีแบบพริบตาเดียว! (ผู้ใช้ไม่ต้องรอโหลด)
          setStatus('success');
          if (typeof onSubmit === 'function') onSubmit(); 
          
          try {
            // 🚀 4. ระบบจะแอบทำการเตรียมรูปภาพเบื้องหลัง (เผื่อรูปใหญ่เกินกว่าที่ Google จะรับไหว)
            let processedImages = typeof images !== 'undefined' ? images : [];
            if (typeof compressImage === 'function' && processedImages.length > 0) {
               // แอบบีบอัดเบื้องหลังเพื่อรับประกันว่า "เซฟลง Sheets 100%"
               processedImages = await Promise.all(processedImages.map(img => compressImage(img)));
            }

            const finalDataToSubmit = { ...formData, image: processedImages, status: 'งานใหม่' };
            
            // 🚀 5. ทำงานส่งข้อมูลอยู่เบื้องหลังเงียบๆ
            if (typeof google !== 'undefined' && google.script) { 
              google.script.run
                .withSuccessHandler(res => { 
                  if (res && res.duplicate) { 
                    console.warn(res.message); 
                  } else if (typeof clearForm === 'function') {
                    clearForm(); // ล้างฟอร์มเมื่อชัวร์ว่า Google บันทึกเสร็จแล้ว
                  }
                })
                .withFailureHandler((err) => { 
                  console.error("เกิดข้อผิดพลาดในการบันทึกหลังบ้าน:", err); 
                })
                .createJob(finalDataToSubmit, typeof currentUser !== 'undefined' && currentUser ? currentUser.name : 'EMP');
            } else { 
              if (typeof clearForm === 'function') clearForm(); 
            } 
          } catch (error) {
             console.error("เกิดข้อผิดพลาดเบื้องหลัง:", error);
          }
        };

        return (
          <div className="w-full relative z-20 pb-8 animate-fade-in">
            {status === 'success' && ( <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in"><div className="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full text-center border border-purple-100"><div className="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-5 border-4 border-green-100"><Icon name="CheckCircle" className="w-12 h-12 text-green-500" /></div><h3 className="text-2xl font-black text-[#5F259F] mb-2 tracking-tight">บันทึกข้อมูลเรียบร้อย</h3><p className="text-gray-500 mb-8 text-sm font-medium">ข้อมูลของคุณถูกจัดเก็บต่อในฐานข้อมูลเรียบร้อยแล้ว</p><div className="flex flex-col gap-3"><button onClick={() => setStatus('idle')} className="w-full bg-gradient-to-r from-[#5F259F] to-[#7A2F8F] text-white font-bold py-3.5 rounded-xl shadow-lg hover:shadow-purple-300 transition">แจ้งรายการใหม่เพิ่ม</button><button onClick={onViewDashboard} className="w-full bg-purple-50 text-[#5F259F] font-bold py-3.5 rounded-xl hover:bg-purple-100 transition">ไปที่หน้า รายการแจ้งซ่อม</button></div></div></div> )}
            <CustomAlert message={alertMsg} onClose={() => setAlertMsg(null)} />
            
            <form onSubmit={handleSubmit} className="bg-white rounded-3xl shadow-xl p-6 md:p-8 lg:p-10 border border-gray-100">
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12">
                
                {/* 📌 คอลัมน์ซ้าย: ข้อมูลอุปกรณ์ + ข้อมูลผู้แจ้ง */}
                <div className="space-y-8">
                  <div className="space-y-4">
                    <label className="text-[20px] md:text-[22px] font-semibold text-gray-800 flex items-center gap-2"><div className="w-1.5 h-6 bg-[#FFC90E] rounded-full"></div> ข้อมูลอุปกรณ์</label>
                    <div className="bg-purple-50/50 rounded-2xl p-5 border border-purple-100 space-y-5">
                      <div><label className="text-[14px] text-purple-700 uppercase tracking-wider font-bold block mb-1.5 ml-1">หมายเลขมิเตอร์ (PEA NO.) *</label><div className="relative"><input ref={meterRef} type="text" inputMode="numeric" pattern="[0-9]*" maxLength={10} value={formData.meterId} onChange={handleMeterChange} disabled={autoFillingCA || (formData.caNo.length > 0 && caSearchStatus === 'idle')} placeholder="ระบุหมายเลขมิเตอร์" className={`w-full p-2 pr-10 bg-white border rounded-xl outline-none transition-all font-medium ${errorField === 'meterId' ? 'error-blink bg-red-50 border-red-400' : 'border-purple-200 focus:ring-2 focus:ring-[#5F259F]'} ${(formData.meterId.length > 0 && formData.meterId.length !== 8 && formData.meterId.length !== 10) ? 'text-red-500' : 'text-gray-800'} ${autoFillingCA || (formData.caNo.length > 0 && caSearchStatus === 'idle') ? 'bg-gray-100 opacity-60 cursor-not-allowed' : ''}`} />{autoFillingMeter && <div className="absolute right-4 top-1/2 -translate-y-1/2 text-purple-600"><Icon name="Loader" className="w-5 h-5 animate-spin" /></div>}</div></div>
                      <div><label className="text-[14px] text-purple-700 uppercase tracking-wider font-bold block mb-1.5 ml-1">หมายเลขผู้ใช้ไฟฟ้า (CA) *</label><div className="relative"><input type="text" inputMode="numeric" pattern="[0-9]*" maxLength={11} value={formData.caNo} onChange={handleCAChange} disabled={autoFillingMeter || (formData.meterId.length > 0 && meterSearchStatus === 'idle')} placeholder="หมายเลขผู้ใช้ไฟฟ้า" className={`w-full p-2 pr-10 bg-white border rounded-xl outline-none transition-all font-medium ${errorField === 'caNo' ? 'error-blink bg-red-50 border-red-400' : 'border-purple-200 focus:ring-2 focus:ring-[#5F259F]'} ${(formData.caNo.length > 0 && formData.caNo.length !== 11) ? 'text-red-500' : 'text-gray-800'} ${autoFillingMeter || (formData.meterId.length > 0 && meterSearchStatus === 'idle') ? 'bg-gray-100 opacity-60 cursor-not-allowed' : ''}`} />{autoFillingCA && <div className="absolute right-4 top-1/2 -translate-y-1/2 text-purple-600"><Icon name="Loader" className="w-5 h-5 animate-spin" /></div>}</div></div>
                      <CustomCombobox inputRef={causeRef} label="สาเหตุชำรุด *" value={formData.cause} onChange={(val) => setFormData({...formData, cause: val})} options={sortedCauses} placeholder="เลือก หรือพิมพ์สาเหตุใหม่" labelClassName="text-[14px] text-purple-700 uppercase tracking-wider font-bold block mb-1.5 ml-1" className={`w-full p-2 bg-white border rounded-xl outline-none transition-all ${errorField === 'cause' ? 'error-blink bg-red-50' : 'border-purple-200 focus:ring-2 focus:ring-[#5F259F]'}`} />
                      <CustomCombobox label="เหตุผลชำรุด *" value={formData.defectReason} onChange={(val) => setFormData({...formData, defectReason: val})} options={sortedDefectReasons} placeholder="เลือก หรือพิมพ์เหตุผลใหม่" labelClassName="text-[14px] text-purple-700 uppercase tracking-wider font-bold block mb-1.5 ml-1" className={`w-full p-2 bg-white border rounded-xl outline-none transition-all ${errorField === 'defectReason' ? 'error-blink bg-red-50' : 'border-purple-200 focus:ring-2 focus:ring-[#5F259F]'}`} />
                    </div>
                  </div>

                  <div className="space-y-4">
                    <label className="text-[20px] md:text-[22px] font-semibold text-gray-800 flex items-center gap-2"><div className="w-1.5 h-6 bg-[#FFC90E] rounded-full"></div> ข้อมูลผู้แจ้ง</label>
                    <div className="bg-purple-50/50 rounded-2xl p-5 border border-purple-100 space-y-5">
                      <div>
                        <label className="text-[14px] text-purple-700 uppercase tracking-wider font-bold block mb-1.5 ml-1">ชื่อผู้แจ้ง *</label>
                        <input ref={reporterRef} type="text" value={formData.reporterName} disabled className="w-full p-2 bg-gray-100 border border-gray-200 rounded-xl outline-none text-gray-500 font-bold cursor-not-allowed opacity-90" />
                      </div>
                      <div><label className="text-[14px] text-purple-700 uppercase tracking-wider font-bold block mb-1.5 ml-1">หมายเหตุเพิ่มเติม</label><textarea value={formData.note} onChange={(e) => setFormData({...formData, note: e.target.value})} rows="1" placeholder="รายละเอียดอื่นๆ..." className="w-full p-2 bg-white border border-purple-200 rounded-xl focus:ring-2 focus:ring-[#5F259F] outline-none transition-all resize-none"></textarea></div>
                    </div>
                  </div>
                </div>

                {/* 📌 คอลัมน์ขวา: พิกัดสถานที่ + รูปถ่ายประกอบ */}
                <div className="space-y-8 flex flex-col">
                  <div className="space-y-4" ref={locationRef}>
                    <label className="text-[20px] md:text-[22px] font-semibold text-gray-800 flex items-center gap-2"><div className="w-1.5 h-6 bg-[#FFC90E] rounded-full"></div> พิกัดสถานที่ *</label>
                    <div className={`rounded-2xl p-5 border transition-all duration-300 ${errorField === 'location' ? 'error-blink bg-red-50' : 'bg-purple-50/50 border-purple-100'}`}>
                      <div className="flex gap-4 mb-4">
                        <div className="w-1/2"><label className="text-[12px] text-purple-600 uppercase tracking-wider font-bold block mb-1.5">Latitude</label><input type="number" step="any" value={formData.lat} onChange={(e) => setFormData({...formData, lat: e.target.value})} placeholder="0.000000" className="w-full p-2 bg-white border border-purple-200 rounded-xl text-center font-mono text-gray-700 focus:ring-2 focus:ring-[#5F259F] outline-none" /></div>
                        <div className="w-1/2"><label className="text-[12px] text-purple-600 uppercase tracking-wider font-bold block mb-1.5">Longitude</label><input type="number" step="any" value={formData.lng} onChange={(e) => setFormData({...formData, lng: e.target.value})} placeholder="0.000000" className="w-full p-2 bg-white border border-purple-200 rounded-xl text-center font-mono text-gray-700 focus:ring-2 focus:ring-[#5F259F] outline-none" /></div>
                      </div>
                      <button type="button" onClick={getLocation} disabled={gpsLoading} className={`w-full py-2 rounded-xl text-[15px] font-bold flex items-center justify-center gap-2 transition shadow-sm ${gpsLoading ? 'bg-gray-100 text-gray-500' : 'bg-white border border-purple-200 text-[#5F259F] hover:bg-purple-50'}`}>{gpsLoading ? <span className="animate-pulse">กำลังค้นหา...</span> : <><Icon name="MapPin" className="w-5 h-5" /> อัปเดตพิกัดปัจจุบัน</>}</button>
                    </div>
                  </div>

                  <div className="space-y-4 flex-grow flex flex-col">
                    <label className="text-[20px] md:text-[22px] font-semibold text-gray-800 flex items-center gap-2"><div className="w-1.5 h-6 bg-[#FFC90E] rounded-full"></div> รูปถ่ายประกอบ</label>
                    <div className="bg-purple-50/50 rounded-2xl p-5 border border-purple-100 flex-grow h-full min-h-[250px]">
                      {images.length === 0 ? ( 
                        <label className="border-2 border-dashed border-purple-300 rounded-2xl p-6 flex flex-col items-center justify-center bg-white hover:bg-purple-50 transition cursor-pointer group h-full min-h-[220px] w-full">
                          <input type="file" multiple accept="image/*" onChange={(e) => {
                            const files = Array.from(e.target.files);
                            if (images.length + files.length > 10) { alert("แนบรูปได้สูงสุด 10 รูป"); return; }
                            files.forEach(file => {
                              const reader = new FileReader();
                              reader.onloadend = () => setImages(prev => [...prev, reader.result]);
                              reader.readAsDataURL(file);
                            });
                          }} className="hidden" />
                          <div className="bg-gray-100 p-4 rounded-full shadow-sm mb-3 group-hover:scale-110 transition-transform">
                            <Icon name="Camera" className="w-8 h-8 text-gray-600" />
                          </div>
                          <span className="text-[16px] font-bold text-gray-600">คลิกเพื่อเลือกจากไฟล์ หรือ อัลบั้ม</span>
                          <span className="text-[13px] font-medium text-purple-500 mt-1.5">(เพิ่มได้สูงสุด 10 ภาพ)</span>
                        </label>
                      ) : (
                        <div className="flex flex-wrap gap-3">
                          {images.map((img, idx) => (
                            <div key={idx} className="relative w-[110px] h-[110px] rounded-2xl overflow-hidden shadow-sm border border-purple-200 bg-white group shrink-0">
                              <img src={img} alt="Preview" className="w-full h-full object-cover" />
                              <button type="button" onClick={() => setImages(images.filter((_, i) => i !== idx))} className="absolute top-1.5 right-1.5 bg-red-500 text-white p-1.5 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition"><Icon name="X" className="w-3.5 h-3.5" /></button>
                            </div>
                          ))}
                          {images.length < 10 && (
                            <label className="border-2 border-dashed border-purple-300 rounded-2xl flex flex-col items-center justify-center bg-white hover:bg-purple-50 transition cursor-pointer w-[110px] h-[110px] shrink-0">
                              <input type="file" multiple accept="image/*" onChange={(e) => {
                                const files = Array.from(e.target.files);
                                if (images.length + files.length > 10) { alert("แนบรูปได้สูงสุด 10 รูป"); return; }
                                files.forEach(file => {
                                  const reader = new FileReader();
                                  reader.onloadend = () => setImages(prev => [...prev, reader.result]);
                                  reader.readAsDataURL(file);
                                });
                              }} className="hidden" />
                              <div className="bg-gray-100 p-3 rounded-full shadow-sm mb-2"><Icon name="Camera" className="w-5 h-5 text-gray-600" /></div>
                              <span className="text-[11px] font-bold text-gray-500">เพิ่ม ({images.length}/10)</span>
                            </label>
                          )}
                        </div>
                      )}
                    </div>
                  </div>

                </div>
              </div>

              {/* 📌 ปุ่มยืนยัน */}
              <div className="mt-5 pt-5 border-t border-gray-100 flex justify-center">
                <button type="submit" disabled={status === 'loading'} className="w-full md:w-2/3 lg:w-[400px] bg-gradient-to-r from-[#5F259F] to-[#7A2F8F] text-white font-black py-3 md:py-5 rounded-2xl shadow-xl hover:shadow-purple-300 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3 text-l md:text-xl">
                  {status === 'loading' ? 'กำลังส่งข้อมูล...' : <><Icon name="Send" className="w-6 h-6" /> ยืนยันการแจ้งเหตุ</>}
                </button>
              </div>
            </form>
          </div>
        );
      };

      const JobCompletionModal = ({ job, onClose, onConfirm, onDelete, currentUser, mode }) => {
        const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

        // 💡แยกดึง "เหตุผลยกเลิก" ออกมาจากช่องหมายเหตุ (ถ้ามีคำว่า [ยกเลิก: ...])
        let initialNote = job.note || '';
        let initialCancelReason = '';
        if (initialNote.startsWith('[ยกเลิก:')) {
           const closingIdx = initialNote.indexOf(']');
           if (closingIdx !== -1) {
              // ดึงเฉพาะข้อความระหว่าง [ยกเลิก: และ ]
              initialCancelReason = initialNote.substring(initialNote.indexOf(':') + 1, closingIdx).trim();
              // ส่วนที่เหลือให้กลับไปเป็นหมายเหตุปกติ
              initialNote = initialNote.substring(closingIdx + 1).trim();
           }
        }

        const [formData, setFormData] = useState({ 
          jobNo: job.jobNo || '', 
          timestamp: job.timestamp || '', 
          duration: job.duration || '', 
          mru: job.mru || '', 
          sequenceNo: job.sequenceNo || '', 
          rateCategory: job.rateCategory || '', 
          meterSize: job.meterSize || '', 
          caNo: job.ca || job.caNo || '', 
          userName: job.userName || '', 
          userAddress: job.userAddress || '', 
          meterId: job.meterId || '', 
          reporterName: job.reporterName || '', 
          cause: job.cause || '', 
          lat: job.lat || '', 
          lng: job.lng || '', 
          note: initialNote, 
          status: (job.status || 'งานใหม่').trim(), 
          cancelReason: initialCancelReason, 
        });
        
        const isCoreDataReadOnly = !canUserEditCoreData(currentUser, job.status) || mode === 'view';
        const availableStatuses = getAvailableStatuses(currentUser, job.status);
        const isStatusDisabled = availableStatuses.length <= 1 || mode === 'view'; 
        const canSave = (!isStatusDisabled || !isCoreDataReadOnly) && mode !== 'view';
        
        const roles = getUserRoles(currentUser);
        const isAdmin = roles.includes('Admin');
        const isEmployee = roles.includes('Employee');
        const isCoordinator = roles.includes('Coordinator');
        
        const canDelete = (isAdmin || (isCoordinator && (job.status === 'งานใหม่' || job.status === 'รับเรื่อง')) || (isEmployee && job.status === 'งานใหม่')) && job.status !== 'ปิดงาน (TECO)';
        
        const [images, setImages] = useState(() => { return job.image ? job.image.split(',').filter(Boolean) : []; });
        const originalImageCount = useRef(job.image ? job.image.split(',').filter(Boolean).length : 0);
        
        // 💡 1. ประกาศ State สำหรับเก็บรูปปิดงานของ Audit 
        // ถ้าหลังบ้านมีการเก็บลิงก์รูปไว้ที่ job.auditLink (คอลัมน์ Z) ก็จะดึงมาแสดงด้วย
        const [auditImages, setAuditImages] = useState(() => { 
           return job.auditLink ? job.auditLink.split(',').filter(Boolean) : []; 
        });

        const [viewImage, setViewImage] = useState(null); const [viewImgIdx, setViewImgIdx] = useState(0);
        const touchStartX = useRef(0); const touchEndX = useRef(0);
        const [gpsLoading, setGpsLoading] = useState(false); const [autoFilling, setAutoFilling] = useState(false);
        const [isSubmitting, setIsSubmitting] = useState(false); const [alertMsg, setAlertMsg] = useState(null);
        const [fetchedCauses, setFetchedCauses] = useState([]); const [employees, setEmployees] = useState([]);
        const causeRef = useRef(null); const reporterRef = useRef(null);
        
        useEffect(() => { if (typeof google !== 'undefined' && google.script) { google.script.run.withSuccessHandler(res => { if(res) setFetchedCauses(res.causes || []); }).getUniqueOptions(); google.script.run.withSuccessHandler(res => { if(res && res.length > 0) setEmployees(res); }).getEmployees(); } }, []);
        const handleChange = (field, value) => { setFormData(prev => ({ ...prev, [field]: value })); };
        
        const handleAutoFillCA = () => { const mId = formData.meterId.trim(); if (!mId || mId.length < 4) return; setAutoFilling(true);
        if (typeof google !== 'undefined' && google.script) { google.script.run.withSuccessHandler(res => { setAutoFilling(false); if (res.found) { setFormData(prev => ({ ...prev, mru: res.mru || prev.mru, sequenceNo: res.sequenceNo || prev.sequenceNo, rateCategory: res.rateCategory || prev.rateCategory, meterSize: res.meterSize || prev.meterSize, caNo: res.caNo || prev.caNo, userName: res.name || prev.userName, userAddress: res.address || prev.userAddress })); } }).withFailureHandler(() => setAutoFilling(false)).searchCustomerFull(mId);
        } else { setTimeout(() => setAutoFilling(false), 800); } };
        
        const getLocation = () => { setGpsLoading(true);
        if (!navigator.geolocation) { setAlertMsg("อุปกรณ์ไม่รองรับ GPS"); setGpsLoading(false); return; } navigator.geolocation.getCurrentPosition( (pos) => { handleChange('lat', pos.coords.latitude.toFixed(6)); handleChange('lng', pos.coords.longitude.toFixed(6)); setGpsLoading(false); }, (err) => { setAlertMsg("ไม่สามารถดึงพิกัดได้ โปรดตรวจสอบการอนุญาตการเข้าถึงตำแหน่ง"); setGpsLoading(false); }, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 } );
        };
        
        const handleSubmit = async (e) => { 
          e.preventDefault(); 
          
          // 🔴 ดักจับ: ยกเลิกต้องใส่เหตุผล ห้ามเป็นค่าว่างหรือขีด (-)
          if (formData.status === 'ยกเลิก') {
             const reasonClean = String(formData.cancelReason || '').trim();
             if (reasonClean === '' || reasonClean === '-') {
                setAlertMsg('⚠️ ไม่สามารถบันทึกได้!\n\nกรุณาระบุเหตุผลในการยกเลิกใบงานนี้ให้ชัดเจน ก่อนทำการกดปุ่มบันทึกข้อมูล');
                return; 
             }
          }
          
          // 🔴 ดักจับ: ปิดงาน (TECO) ต้องมีรูปปิดงานอย่างน้อย 1 รูป
          if (formData.status === 'ปิดงาน (TECO)' && auditImages.length === 0) {
            setAlertMsg('สิทธิ์ Audit: กรุณาแนบรูปถ่ายหลักฐานอย่างน้อย 1 รูป เพื่อยืนยันการปิดงาน (TECO)');
            return;
          }

          setIsSubmitting(true); 
          let finalData = { ...formData }; 
          if (finalData.status === 'ยกเลิก' && finalData.cancelReason) { 
             finalData.note = `[ยกเลิก: ${finalData.cancelReason}]\n${finalData.note}`; 
          } 
          
          // ประมวลผลและบีบอัดรูปถ่ายปกติ
          let processedImages = await Promise.all(
            images.map(img => {
              if (img.startsWith('data:image')) return compressImage(img);
              return img;
            })
          );
          finalData.image = processedImages;
          
          // ประมวลผลและบีบอัดรูปปิดงาน (TECO) ส่งไปบันทึกลงช่อง M
          if (formData.status === 'ปิดงาน (TECO)' && auditImages.length > 0) {
            finalData.auditImages = await Promise.all(
               auditImages.map(img => img.startsWith('data:image') || img.startsWith('data:application/pdf') ? compressImage(img) : img)
            );
          }
          
          if (onConfirm) onConfirm(job.id, finalData, 'edit'); 
        };

        const labelClass = "text-[11px] font-bold text-gray-500 uppercase mb-1 block";
        const readOnlyClass = "w-full p-2.5 bg-gray-100 border border-gray-200 rounded-lg text-sm text-gray-400 cursor-not-allowed opacity-80";
        const editableClass = "w-full p-2.5 bg-white border border-purple-300 rounded-lg text-sm font-bold text-black outline-none focus:ring-2 focus:ring-[#5F259F] transition-shadow disabled:bg-gray-100 disabled:text-gray-400 disabled:border-gray-200 disabled:cursor-not-allowed";
        
        return ReactDOM.createPortal(
          <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in">
            <div className="bg-white rounded-2xl shadow-2xl overflow-hidden max-w-5xl w-full max-h-[95vh] flex flex-col animate-fade-in transform scale-100 border border-gray-100">
              <div className="bg-[#5F259F] p-4 text-white flex justify-between items-center shrink-0 shadow-md z-10 relative"><h2 className="text-lg font-black flex items-center gap-2 tracking-wide"><Icon name={mode === 'view' ? 'Eye' : 'Edit'} className="w-5 h-5" />ตรวจสอบข้อมูล</h2><button onClick={onClose} className="p-1.5 hover:bg-white/20 rounded-full transition bg-black/10"><Icon name="X" className="w-5 h-5" /></button></div>
              <div className="p-6 overflow-y-auto flex-grow no-scrollbar bg-gray-50/50 relative">
                <form id="fullEditForm" onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-x-4 gap-y-5">
                  <div><label className={labelClass}>No.</label><input type="text" value={formData.jobNo || '-'} disabled className={readOnlyClass} /></div>
                  <div><label className={labelClass}>วันที่แจ้ง</label><input type="text" value={formatDate(formData.timestamp) || '-'} disabled className={readOnlyClass} /></div>
                  <div><label className={labelClass}>ระยะเวลา</label><input type="text" value={formData.duration || '-'} disabled className={readOnlyClass} /></div>
                  <div className="hidden lg:block"></div>
                  <div className="md:col-span-1 lg:col-span-1"><label className={labelClass}>PEA มิเตอร์ {autoFilling && <span className="text-[9px] text-orange-500 animate-pulse">(กำลังค้นหา...)</span>}</label><input type="text" value={formData.meterId} onChange={e => handleChange('meterId', e.target.value)} onBlur={handleAutoFillCA} disabled={isCoreDataReadOnly} className={editableClass} placeholder="ระบุเลข PEA มิเตอร์" /></div>
                  <div><label className={labelClass}>หน่วยการอ่าน</label><input type="text" value={formData.mru || '-'} disabled className={readOnlyClass} /></div>
                  <div><label className={labelClass}>เลขลำดับหน่วย</label><input type="text" value={formData.sequenceNo || '-'} disabled className={readOnlyClass} /></div>
                  <div><label className={labelClass}>หมวดอัตรา</label><input type="text" value={formData.rateCategory || '-'} disabled className={readOnlyClass} /></div>
                  <div className="md:col-span-2 lg:col-span-2"><label className={labelClass}>คำอธิบายหมวดอุปกรณ์</label><input type="text" value={formData.meterSize || '-'} disabled className={readOnlyClass} /></div>
                  <div className="md:col-span-1 lg:col-span-2"><label className={labelClass}>หมายเลขผู้ใช้ไฟฟ้า (CA) *</label><input type="text" value={formData.caNo || '-'} disabled className={readOnlyClass} /></div>
                  <div className="md:col-span-3 lg:col-span-2"><label className={labelClass}>ชื่อ-นามสกุล</label><input type="text" value={formData.userName || '-'} disabled className={readOnlyClass} /></div>
                  <div className="md:col-span-3 lg:col-span-2"><label className={labelClass}>ที่อยู่-สถานที่ใช้ไฟฟ้า</label><textarea value={formData.userAddress || '-'} disabled rows="1" className={`${readOnlyClass} resize-none`}></textarea></div>
                  <div className="md:col-span-2 lg:col-span-2 relative z-50"><CustomCombobox inputRef={causeRef} label="สาเหตุชำรุด" value={formData.cause} onChange={(val) => handleChange('cause', val)} options={CAUSE_OPTIONS} placeholder="เลือกหรือพิมพ์สาเหตุ" className={editableClass} disabled={isCoreDataReadOnly} /></div>
                  <div className="md:col-span-1 lg:col-span-2"><label className={labelClass}>ชื่อผู้แจ้ง</label><input type="text" value={formData.reporterName || '-'} disabled className={readOnlyClass} /></div>
                  <div className="md:col-span-1 lg:col-span-1"><label className={labelClass}>ละติจูด (LAT)</label><input type="text" value={formData.lat} onChange={e => handleChange('lat', e.target.value)} className={editableClass} disabled={isCoreDataReadOnly} /></div>
                  <div className="md:col-span-1 lg:col-span-1"><label className={labelClass}>ลองจิจูด (LNG)</label><input type="text" value={formData.lng} onChange={e => handleChange('lng', e.target.value)} className={editableClass} disabled={isCoreDataReadOnly} /></div>
                  {!isCoreDataReadOnly && ( <div className="md:col-span-1 lg:col-span-2 flex items-end"><button type="button" onClick={getLocation} disabled={gpsLoading} className="w-full py-2.5 bg-blue-50 text-blue-600 border border-blue-200 rounded-lg text-[16px] font-bold hover:bg-blue-100 flex items-center justify-center gap-2 transition"><Icon name="MapPin" className={`w-4 h-4 ${gpsLoading ? 'animate-bounce' : ''}`} /> {gpsLoading ? 'กำลังค้นหา...' : 'อัปเดตพิกัดปัจจุบัน'}</button></div> )}
                  
                  <div className="md:col-span-3 lg:col-span-4">
                    <label className={labelClass}>รูปถ่ายประกอบ ({images.length}/10)</label>
                    <div className="flex flex-wrap gap-3 bg-gray-50 p-3 rounded-xl border border-gray-200 min-h-[100px]">
                      {images.map((img, idx) => (
                        <div key={idx} onClick={() => { setViewImage(images); setViewImgIdx(idx); }} className="relative w-20 h-20 rounded-lg overflow-hidden border border-gray-300 bg-black flex justify-center group shrink-0 cursor-pointer">
                          <img src={getProcessedImageUrl(img)} alt="Preview" className="h-full object-cover w-full group-hover:opacity-80 transition-opacity" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/150?text=No+Image'; }} />
                          {canSave && idx >= originalImageCount.current && ( 
                            <button type="button" onClick={(e) => { e.stopPropagation(); setImages(images.filter((_, i) => i !== idx)); }} className="absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition"><Icon name="X" className="w-3 h-3" /></button> 
                          )}
                        </div>
                      ))}
                      {canSave && images.length < 10 && (
                        <label className="border-2 border-dashed border-purple-300 bg-white hover:bg-purple-50 cursor-pointer rounded-lg flex flex-col items-center justify-center transition w-20 h-20 shrink-0">
                          <input type="file" multiple accept="image/*" onChange={(e) => {
                             const files = Array.from(e.target.files);
                            if (images.length + files.length > 10) { alert("แนบรูปได้สูงสุด 10 รูป"); return; }
                            files.forEach(file => {
                               const reader = new FileReader();
                              reader.onloadend = () => setImages(prev => [...prev, reader.result]);
                              reader.readAsDataURL(file);
                            });
                          }} className="hidden" />
                          <Icon name="Camera" className="w-5 h-5 text-purple-400" />
                          <span className="text-[9px] font-bold text-gray-500 mt-1">เพิ่มรูป</span>
                        </label>
                       )}
                    </div>
                  </div>

                  <div className="md:col-span-3 lg:col-span-2"><label className={labelClass}>หมายเหตุ</label><textarea value={formData.note} onChange={e => handleChange('note', e.target.value)} rows="2" className={`${editableClass} resize-none h-20`} disabled={!canSave}></textarea></div>
                  <div className="md:col-span-3 lg:col-span-2"><label className={labelClass}>สถานะงาน</label><div className="relative inline-block w-full"><select value={formData.status} onChange={e => handleChange('status', e.target.value)} disabled={isStatusDisabled} className={`${editableClass} ${isStatusDisabled ? 'opacity-80 cursor-not-allowed bg-gray-100' : 'cursor-pointer'}`}>{availableStatuses.map(s => <option key={s} value={s}>{s}</option>)}</select>{!isStatusDisabled && ( <Icon name="ChevronDown" className="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none opacity-50" /> )}</div></div>
                  {formData.status === 'ยกเลิก' && ( <div className="md:col-span-3 lg:col-span-4 bg-red-50 p-4 rounded-xl border border-red-200 animate-fade-in"><label className="text-[11px] font-bold text-red-600 uppercase mb-1 block">เหตุผลการยกเลิก *</label><textarea value={formData.cancelReason} onChange={e => handleChange('cancelReason', e.target.value)} rows="2" placeholder="กรุณาระบุเหตุผลที่ยกเลิกงานนี้..." className="w-full p-2.5 bg-white border border-red-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-red-500 resize-none font-bold text-red-700" disabled={!canSave}></textarea></div> )}
                  
                  {/* 💡 4. วางกล่องแนบไฟล์สำหรับ Audit เมื่อเลือกปิดงาน (TECO) */}
                  {formData.status === 'ปิดงาน (TECO)' && (
                    <div className="md:col-span-3 lg:col-span-4 animate-fade-in">
                      <label className={labelClass}>รูปถ่ายหลักฐานปิดงาน (TECO) ({auditImages.length}/5) </label>
                      <div className="flex flex-wrap gap-3 bg-gray-50 p-3 rounded-xl border border-gray-200 min-h-[100px]">
                        {auditImages.map((img, idx) => (
                          <div key={idx} className="relative w-20 h-20 rounded-lg overflow-hidden border border-gray-300 bg-black flex justify-center group shrink-0 cursor-pointer">
                            {img.includes('application/pdf') ? (
                               <div className="w-full h-full bg-white flex flex-col items-center justify-center cursor-pointer hover:opacity-80 transition-opacity" onClick={() => window.open(img, '_blank')}>
                                  <Icon name="FileText" className="w-8 h-8 text-purple-500" />
                                  <span className="text-[8px] font-bold text-gray-500 mt-1 break-words w-full text-center px-1">เอกสาร PDF</span>
                               </div>
                            ) : (
                               <img src={getProcessedImageUrl(img)} onClick={() => { setViewImage(auditImages); setViewImgIdx(idx); }} alt="Audit Preview" className="h-full object-cover w-full group-hover:opacity-80 transition-opacity" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/150?text=No+Image'; }} />
                            )}
                            {canSave && (
                               <button type="button" onClick={(e) => { e.stopPropagation(); setAuditImages(auditImages.filter((_, i) => i !== idx)); }} className="absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition"><Icon name="X" className="w-3 h-3" /></button> 
                            )}
                          </div>
                        ))}
                        
                        {canSave && auditImages.length < 5 && (
                          <label className="border-2 border-dashed border-purple-300 bg-white hover:bg-purple-50 cursor-pointer rounded-lg flex flex-col items-center justify-center transition w-20 h-20 shrink-0">
                            <input type="file" multiple accept="image/*,application/pdf" onChange={(e) => {
                              const files = Array.from(e.target.files);
                              if (auditImages.length + files.length > 5) { alert("แนบเอกสารปิดงานได้สูงสุด 5 ไฟล์"); return; }
                              files.forEach(file => {
                                const reader = new FileReader();
                                reader.onloadend = () => setAuditImages(prev => [...prev, reader.result]);
                                reader.readAsDataURL(file);
                              });
                            }} className="hidden" />
                            <Icon name="Camera" className="w-5 h-5 text-purple-400" />
                            <span className="text-[9px] font-bold text-gray-500 mt-1">เพิ่มไฟล์</span>
                          </label>
                        )}
                      </div>
                    </div>
                  )}

                </form>
              </div>
              
              <div className="p-4 border-t bg-white flex justify-between items-center shrink-0 rounded-b-2xl shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-10 relative">
                <div>
                  {canDelete && (
                    <>
                      <button type="button" onClick={() => setShowDeleteConfirm(true)} className="px-4 py-2.5 rounded-xl font-bold text-red-500 bg-red-50 hover:bg-red-100 border border-red-100 transition text-sm flex items-center gap-2">
                        <Icon name="Trash" className="w-4 h-4" /> ลบใบงาน
                      </button>
                      <ConfirmDeleteModal 
                        isOpen={showDeleteConfirm} 
                        onClose={() => setShowDeleteConfirm(false)} 
                        onConfirm={() => { onDelete(job.id); setShowDeleteConfirm(false); onClose(); }} 
                        title="ลบใบงานนี้หรือไม่?"
                        message="คุณแน่ใจหรือไม่ที่จะลบใบงานนี้? ข้อมูลจะถูกลบออกจากระบบถาวรและไม่สามารถกู้คืนได้"
                      />
                    </>
                  )}
                </div>
                <div className="flex items-center gap-3">
                  <button onClick={onClose} type="button" className="px-6 py-2.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition text-sm">ปิดหน้าต่าง</button>
                  {canSave && ( <button type="submit" form="fullEditForm" disabled={isSubmitting} className="px-8 py-2.5 rounded-xl font-black text-white bg-[#5F259F] hover:bg-[#4a1d7c] shadow-lg shadow-purple-200 transition text-sm flex items-center gap-2 active:scale-95 disabled:opacity-50">{isSubmitting ? <Icon name="Refresh" className="w-4 h-4 animate-spin" /> : <Icon name="Check" className="w-4 h-4" />} {isSubmitting ? 'กำลังบันทึก...' : 'บันทึกข้อมูล'}</button> )}
                </div>
              </div>
              <CustomAlert message={alertMsg} onClose={() => setAlertMsg(null)} />
              
              {viewImage && viewImage.length > 0 && ReactDOM.createPortal(
                <div 
                  className="fixed inset-0 z-[10000] flex items-center justify-center bg-black/95 backdrop-blur-md animate-fade-in select-none" 
                  onClick={() => {setViewImage(null); setViewImgIdx(0);}}
                  onTouchStart={(e) => { touchStartX.current = e.targetTouches[0].clientX; touchEndX.current = e.targetTouches[0].clientX; }}
                  onTouchMove={(e) => { touchEndX.current = e.targetTouches[0].clientX; }}
                  onTouchEnd={() => {
                    const distance = touchStartX.current - touchEndX.current;
                    if (distance > 50) setViewImgIdx(prev => prev === viewImage.length - 1 ? 0 : prev + 1);
                    else if (distance < -50) setViewImgIdx(prev => prev === 0 ? viewImage.length - 1 : prev - 1);
                    touchStartX.current = 0; touchEndX.current = 0;
                  }}
                >
                  <div className="relative w-full h-full flex items-center justify-center" onClick={e => e.stopPropagation()}>
                    {viewImage[viewImgIdx] && viewImage[viewImgIdx].includes('application/pdf') ? (
                       <iframe src={viewImage[viewImgIdx]} className="w-[90%] h-[80vh] bg-white rounded-xl" title="PDF Viewer"></iframe>
                    ) : (
                       <img src={getProcessedImageUrl(viewImage[viewImgIdx])} alt="Evidence" className="max-h-screen max-w-full object-contain mx-auto pointer-events-none" />
                    )}
                    
                    {viewImage.length > 1 && (
                      <>
                        <button onClick={(e) => { e.stopPropagation(); setViewImgIdx(prev => prev === 0 ? viewImage.length - 1 : prev - 1); }} className="absolute left-4 sm:left-10 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/80 text-white p-3 rounded-full transition shadow-lg z-50">
                          <svg className="w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <button onClick={(e) => { e.stopPropagation(); setViewImgIdx(prev => prev === viewImage.length - 1 ? 0 : prev + 1); }} className="absolute right-4 sm:right-10 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/80 text-white p-3 rounded-full transition shadow-lg z-50">
                          <svg className="w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                        <div className="absolute bottom-8 bg-black/60 text-white px-5 py-2 rounded-full text-sm font-bold tracking-widest z-50">
                          {viewImgIdx + 1} / {viewImage.length}
                        </div>
                       </>
                    )}
                    
                    <button onClick={() => {setViewImage(null); setViewImgIdx(0);}} className="absolute top-4 right-4 sm:top-6 sm:right-6 bg-black/40 hover:bg-black/70 text-white p-2 sm:p-3 rounded-full transition z-50">
                      <Icon name="X" className="w-6 h-6 sm:w-8 sm:h-8" />
                    </button>
                  </div>
                </div>, document.body
              )}
            </div>
          </div>, document.body 
        );
      };

      // ==========================================
      // คอมโพเนนต์แผนที่แสดงพิกัดงาน (JobMap)
      // ==========================================
      const JobMap = ({ jobs }) => {
        const mapRef = useRef(null);
        const mapInstance = useRef(null);
        const userMarkerRef = useRef(null); 
        
        const [showFilter, setShowFilter] = useState(() => window.innerWidth > 640);

        const STATUS_COLORS = useMemo(() => ({
          'งานใหม่': '#9CA3AF', 
          'รับเรื่อง': '#3B82F6', 
          'อนุมัติแล้ว': '#6366F1',
          'จ่ายงานแล้ว': '#F59E0B', 
          'สับเปลี่ยน SAP แล้ว': '#14B8A6',
          'ปิดงาน (TECO)': '#10B981', 
          'ยกเลิก': '#EF4444'
        }), []);

        // 🚀 1. กรองเฉพาะงานที่มีพิกัด (Lat/Lng) สมบูรณ์
        const validJobs = useMemo(() => {
          if (!jobs || !Array.isArray(jobs)) return [];
          return jobs.filter(j => j.lat && j.lng && !isNaN(parseFloat(j.lat)) && !isNaN(parseFloat(j.lng)));
        }, [jobs]);

        // 🚀 2. คำนวณจำนวนงานแยกตามสถานะ
        const statusCounts = useMemo(() => {
          const counts = {};

      const StatsPieChart = ({ stats, jobs = [] }) => {

          const causeData = { labels: sortedCauses.map(c => c[0]), datasets: [{ label: 'จำนวนงาน', data: sortedCauses.map(c => c[1]), backgroundColor: barColors, borderRadius: 4 }] };
          
          if (pieChartRef.current) {

            pieChartInstance.current = new Chart(pieChartRef.current, {

          }

          return () => { if (pieChartInstance.current) pieChartInstance.current.destroy(); if (barChartInstance.current) barChartInstance.current.destroy(); };
        }, [stats, jobs]);

        const validTotal = (stats.new || 0) + (stats.received || 0) + (stats.proposed || 0) + (stats.assigned || 0) + (stats.sap || 0) + (stats.teco || 0) + (stats.cancelled || 0);
        return (
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6 mb-8 animate-fade-in w-full items-stretch">

               <div className="text-center sm:text-left mb-6 shrink-0">
                 <h3 className="text-xl sm:text-2xl font-black text-[#5F259F] flex items-center gap-3 justify-center sm:justify-start tracking-tight"><Icon name="Chart" className="w-6 h-6 sm:w-8 sm:h-8" /> Dashboard</h3>
                  <p className="text-gray-500 text-xs sm:text-sm mt-1.5 font-medium">ข้อมูลภาพรวมงานแจ้งมิเตอร์ชำรุดทั้งหมด</p>
               </div>
               
               <div className="flex flex-col xl:flex-row items-center justify-center gap-8 flex-1 w-full">
                  <div className="flex flex-col gap-2.5 w-full xl:w-[50%] shrink-0 relative z-10 order-2 xl:order-1">
                    <div className="flex items-center justify-between bg-gray-50/80 p-2.5 px-4 rounded-xl border border-gray-100 shadow-sm hover:shadow-md hover:bg-white transition-all w-full"><div className="flex items-center gap-3"><span className="w-3 h-3 rounded-full shadow-sm bg-gray-400"></span><span className="text-xs sm:text-sm font-bold text-gray-700">งานใหม่</span></div><span className="text-base sm:text-lg font-black text-gray-900">{stats.new || 0}</span></div>
                    <div className="flex items-center justify-between bg-blue-50/80 p-2.5 px-4 rounded-xl border border-blue-100 shadow-sm hover:shadow-md hover:bg-white transition-all w-full"><div className="flex items-center gap-3"><span className="w-3 h-3 rounded-full shadow-sm bg-blue-500"></span><span className="text-xs sm:text-sm font-bold text-blue-700">รับเรื่อง</span></div><span className="text-base sm:text-lg font-black text-blue-900">{stats.received || 0}</span></div>
                    <div className="flex items-center justify-between bg-indigo-50/80 p-2.5 px-4 rounded-xl border border-indigo-100 shadow-sm hover:shadow-md hover:bg-white transition-all w-full"><div className="flex items-center gap-3"><span className="w-3 h-3 rounded-full shadow-sm bg-indigo-500"></span><span className="text-xs sm:text-sm font-bold text-indigo-700">อนุมัติแล้ว</span></div><span className="text-base sm:text-lg font-black text-indigo-900">{stats.proposed || 0}</span></div>

                  </div>
                  
                  <div className="flex-1 flex justify-center items-center relative z-10 w-full min-h-[220px] order-1 xl:order-2">
                    <div className="relative w-[200px] h-[200px] sm:w-[240px] sm:h-[240px]">
                      <canvas ref={pieChartRef}></canvas>
                      <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span className="text-5xl sm:text-6xl font-black text-[#1F2937] leading-none tracking-tighter drop-shadow-sm">{validTotal}</span>
                        <span className="text-[10px] text-gray-500 font-extrabold uppercase tracking-widest mt-1 bg-white/80 backdrop-blur-sm px-2 py-0.5 rounded-full shadow-sm">งานทั้งหมด</span>
                      </div>
                    </div>
                  </div>
               </div>
            </div>

              <div className="absolute top-0 right-0 w-32 h-32 bg-purple-50 rounded-bl-[100px] opacity-40 pointer-events-none"></div>

              <div className="relative flex-1 w-full min-h-[250px] sm:min-h-[300px] z-10">
                 <canvas ref={barChartRef}></canvas>

          </div>
        );
      };

// ==========================================
      // คอมโพเนนต์ Dashboard หลัก (ใช้ร่วมกันทั้ง User และ Admin)
      // ==========================================
      const UserDashboard = ({ jobs, onRefresh, isRefreshing, lastUpdated, currentUser, onStatusChange, onDeleteJob }) => {
        const isAdmin = getUserRoles(currentUser).includes('Admin');
        const [expandedMobileId, setExpandedMobileId] = useState(null);
        const [isFilterOpen, setIsFilterOpen] = useState(false); const [selectedImage, setSelectedImage] = useState(null); const [currentImgIdx, setCurrentImgIdx] = useState(0);
        const touchStartX = useRef(0);
        const touchEndX = useRef(0);
        const [filterStatus, setFilterStatus] = useState(() => { 
          if (!currentUser) return 'all'; 
          const roles = getUserRoles(currentUser); 
          let defaultStatuses = [];
          if (roles.includes('Employee')) defaultStatuses.push('งานใหม่');

        const [seenCounts, setSeenCounts] = useState(() => {

          return saved ? JSON.parse(saved) : {};
        });

        const showMobileCards = !isAdmin && filterStatus !== 'all';
        const [searchTerm, setSearchTerm] = useState(''); const [filterDateStart, setFilterDateStart] = useState('');
        const [filterDateEnd, setFilterDateEnd] = useState(''); const [filterYear, setFilterYear] = useState(() => new Date().getFullYear().toString());
        const [sortConfig, setSortConfig] = useState({ key: 'timestamp', direction: 'descending' }); const [editingJob, setEditingJob] = useState(null);
        
        const [tecoModalJob, setTecoModalJob] = useState(null); 
        const [auditImages, setAuditImages] = useState([]);
        const [isSubmittingTECO, setIsSubmittingTECO] = useState(false);

        const requestSort = (key) => { let direction = 'ascending'; if (sortConfig.key === key && sortConfig.direction === 'ascending') direction = 'descending'; setSortConfig({ key, direction }); };
        const renderSortIcon = (colKey) => { if (sortConfig.key !== colKey) return <Icon name="Sort" className="w-3 h-3 opacity-30 inline ml-1" />; return sortConfig.direction === 'ascending' ? <Icon name="SortUp" className="w-3 h-3 text-[#5F259F] inline ml-1" /> : <Icon name="SortDown" className="w-3 h-3 text-[#5F259F] inline ml-1" />; };
