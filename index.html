      body {

      input[type=number] { -moz-appearance: textfield; }

      @keyframes blob { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(30px, -50px) scale(1.1); } 66% { transform: translate(-20px, 20px) scale(0.9); } 100% { transform: translate(0px, 0px) scale(1); } }
      .animate-blob { animation: blob 10s infinite; } 
      .animation-delay-2000 { animation-delay: 2s; } 
      .animation-delay-4000 { animation-delay: 4s; }
      .animate-fade-in-up { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

  <body class="text-gray-800 m-0 p-0 w-full overflow-x-hidden">
    <div id="root" class="w-full min-h-screen"></div>

    <script type="text/babel">
// 🔴 นำลิงก์ Web App จากสเต็ปที่ 1 มาวางในเครื่องหมายคำพูดด้านล่างนี้
    const API_URL = "https://script.google.com/macros/s/AKfycbyj0aOAXRudAO2_YAasjzg9R3Z8CaJ1K8GLzJoaSbE2hPflgmAs55JJFpEGj1jBLVSD/exec";

      // 🚀 โค้ดเวทมนตร์จำลองระบบ Google ให้ React ทำงานผ่าน API ได้ 100%
      window.google = {
        script: {
          get run() {
            return {
              _onSuccess: null,
              _onFailure: null,
              withSuccessHandler: function(cb) { this._onSuccess = cb; return this; },
              withFailureHandler: function(cb) { this._onFailure = cb; return this; },
              _call: function(action, args) {
                const successCb = this._onSuccess; const failureCb = this._onFailure;
                fetch(API_URL, {
                  method: 'POST',
                  headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                  body: JSON.stringify({ action, args })
                })
                .then(r => r.json())
                .then(data => {
                  if (data.success && successCb) successCb(data.result);
                  else if (!data.success && failureCb) failureCb(data.error);
                })
                .catch(err => { if (failureCb) failureCb(err); });
              },
              loginUser: function(u,p) { this._call('loginUser', [u,p]); },
              getAdminJobs: function() { this._call('getAdminJobs', []); },
              searchCustomerMulti: function(q) { this._call('searchCustomerMulti', [q]); },
              searchCustomerFull: function(q) { this._call('searchCustomerFull', [q]); },
              createJob: function(data, user) { this._call('createJob', [data, user]); },
              updateJobDetails: function(id, data, user) { this._call('updateJobDetails', [id, data, user]); },
              updateAdminJobStatus: function(id, st, dur, d, u) { this._call('updateAdminJobStatus', [id, st, dur, d, u]); },
              deleteJob: function(id, user) { this._call('deleteJob', [id, user]); },
              getLogs: function() { this._call('getLogs', []); },
              getUniqueOptions: function() { this._call('getUniqueOptions', []); },
              getEmployees: function() { this._call('getEmployees', []); },
              getScriptUrl: function() { this._call('getScriptUrl', []); }
            };
          }
        }
      };

      const { useState, useEffect, useMemo, useCallback, useRef } = React;

      // ==========================================
      // ระบบจัดการสิทธิ์แบบ Multi-Role 
      // ==========================================
      const getUserRoles = (user) => {
        if (!user) return [];
        if (Array.isArray(user.roles)) return user.roles;
        if (typeof user.role === 'string') return user.role.split(',').map(r => r.trim());
        return [];
      };

      const canUserEditCoreData = (user, currentStatus) => {
        const roles = getUserRoles(user);
        if (roles.includes('Admin')) return true; 
        if (currentStatus === 'ยกเลิก' || currentStatus === 'ปิดงาน (TECO)') return false;
        if (roles.includes('Coordinator')) return true; 
        if (roles.includes('Employee') && currentStatus === 'งานใหม่') return true; 
        return false; 
      };

      const canUserDelete = (user, currentStatus) => {
        const roles = getUserRoles(user);
        if (roles.includes('Admin')) return true;
        if (currentStatus === 'ยกเลิก' || currentStatus === 'ปิดงาน (TECO)') return false;
        if (roles.includes('Coordinator')) return true;
        if (roles.includes('Employee') && currentStatus === 'งานใหม่') return true;
        return false;
      };

      const canUserPrint = (user) => {
        const roles = getUserRoles(user);
        if (roles.includes('Admin')) return true;
        if (roles.includes('Coordinator') || roles.includes('Approver')) return true; 
        return false; 
      };

      const canUserCancel = (user, currentStatus) => {
        const roles = getUserRoles(user);
        // 🔴 ปรับใหม่: เฉพาะ Admin หรือ Coordinator เท่านั้นที่มีสิทธิ์ยกเลิก
        if (!roles.includes('Admin') && !roles.includes('Coordinator')) return false;
        if (currentStatus === 'ยกเลิก' || currentStatus === 'ปิดงาน (TECO)') return false;
        return true;
      };

      const getAvailableStatuses = (user, currentStatus) => {
        const roles = getUserRoles(user);
        if ((currentStatus === 'ยกเลิก' || currentStatus === 'ปิดงาน (TECO)') && !roles.includes('Admin')) {
          return [currentStatus];
        }
        if (roles.includes('Admin')) {
          return ['งานใหม่', 'รับเรื่อง', 'อนุมัติแล้ว', 'จ่ายงานแล้ว', 'สับเปลี่ยน SAP แล้ว', 'ปิดงาน (TECO)', 'ยกเลิก'];
        }

        let statuses = new Set([currentStatus]); 
        if (roles.includes('Coordinator') && (currentStatus === 'งานใหม่' || currentStatus === 'รับเรื่อง')) {
            statuses.add('งานใหม่'); statuses.add('รับเรื่อง');
        }
        if (roles.includes('Approver') && (currentStatus === 'รับเรื่อง' || currentStatus === 'อนุมัติแล้ว')) {
            statuses.add('รับเรื่อง'); statuses.add('อนุมัติแล้ว');
        }
        if (roles.includes('Inventory') && (currentStatus === 'อนุมัติแล้ว' || currentStatus === 'จ่ายงานแล้ว')) {
            statuses.add('อนุมัติแล้ว'); statuses.add('จ่ายงานแล้ว');
        }
        if (roles.includes('SAP') && (currentStatus === 'จ่ายงานแล้ว' || currentStatus === 'สับเปลี่ยน SAP แล้ว')) {
            statuses.add('จ่ายงานแล้ว'); statuses.add('สับเปลี่ยน SAP แล้ว');
        }
        if (roles.includes('Audit') && (currentStatus === 'สับเปลี่ยน SAP แล้ว' || currentStatus === 'ปิดงาน (TECO)')) {
            statuses.add('สับเปลี่ยน SAP แล้ว'); statuses.add('ปิดงาน (TECO)');
        }
        if (canUserCancel(user, currentStatus)) {
          statuses.add('ยกเลิก');
        }
        return Array.from(statuses);
      };

      // ==========================================
      // ข้อมูล Options และ Icons
      // ==========================================
      const METER_SIZE_OPTIONS = ["5(15)A", "15(45)A", "30(100)A", "5(45)A", "5(100)A", "CT"];
      const CAUSE_OPTIONS = ["บลูทูธไม่ได้", "หน้าจอแตก", "จอไม่แสดงค่า", "มิเตอร์ไหม้", "ซีลขาด/ชำรุด", "สูญหาย", "อื่นๆ"];
      const DEFECT_REASON_OPTIONS = ['ธรรมชาติ', 'มนุษย์', 'โจรกรรม'];
      const STATUS_OPTIONS = {
        'งานใหม่': { label: 'งานใหม่', color: 'bg-gray-100 text-gray-700 border-gray-300' },
        'รับเรื่อง': { label: 'รับเรื่อง', color: 'bg-blue-50 text-blue-600 border-blue-200' },
        'อนุมัติแล้ว': { label: 'อนุมัติแล้ว', color: 'bg-indigo-50 text-indigo-600 border-indigo-200' },
        'จ่ายงานแล้ว': { label: 'จ่ายงานแล้ว', color: 'bg-amber-50 text-amber-600 border-amber-200' },
        'สับเปลี่ยน SAP แล้ว': { label: 'สับเปลี่ยน SAP แล้ว', color: 'bg-teal-50 text-teal-600 border-teal-200' },
        'ปิดงาน (TECO)': { label: 'ปิดงาน (TECO)', color: 'bg-emerald-50 text-emerald-600 border-emerald-200' },
        'ยกเลิก': { label: 'ยกเลิก', color: 'bg-red-50 text-red-600 border-red-200' }
      };

      const ICONS_DATA = {
        Zap: <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="none" fill="currentColor" />, 
        MapPin: <path d="M12 21s-7-7.5-7-12a7 7 0 1 1 14 0c0 4.5-7 12-7 12zm0-9a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />,
        Camera: <g><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" /><circle cx="12" cy="13" r="4" /></g>,
        Search: <g><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></g>,
        Refresh: <g><path d="M23 4v6h-6" /><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" /></g>,
        User: <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2 M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" />,
        Check: <polyline points="20 6 9 17 4 12" />,
        CheckCircle: <path d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />,
        Clock: <circle cx="12" cy="12" r="10" />,
        Alert: <g><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></g>,
        ChevronDown: <polyline points="6 9 12 15 18 9" />,
        Sort: <path d="M8 9l4-4 4 4m0 6l-4 4-4-4" />,
        SortUp: <path d="M12 19V5m-7 7l7-7 7 7" />,
        SortDown: <path d="M12 5v14m7-7l-7 7-7-7" />,
        Chart: <path d="M18 20V10M12 20V4M6 20v-6" />,
        FileText: <g><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" /></g>,
        X: <path d="M18 6L6 18M6 6l12 12" />,
        History: <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />,
        Link: <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />,
        Edit: <g><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></g>,
        Printer: <g><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></g>,
        LogOut: <g><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></g>,
        Lock: <g><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></g>,
        ArrowRight: <g><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></g>,
        PlusCircle: <path d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />,
        Send: <path d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />,
        Timer: <path d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />,
        Grid: <g><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></g>,
        Loader: <path d="M21 12a9 9 0 1 1-6.219-8.56" />,
        Eye: <g><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></g>,
        EyeOff: <g><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></g>,
        Filter: <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z" />,
        Trash: <g><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></g>
      };

      const Icon = ({ name, className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{ICONS_DATA[name] || ICONS_DATA.Alert}</svg>;

      const parseDate = (dateStr) => {
        if (!dateStr || dateStr === '-') return null;
        try {
          const cleanStr = String(dateStr).trim();
          
          if (cleanStr.includes('T') && cleanStr.includes('Z')) {
             const fallback = new Date(cleanStr); 
             if (!isNaN(fallback.getTime())) return fallback;
          }
          
          if (cleanStr.includes('/')) {
            const parts = cleanStr.split(/[\s,]+/); 
            const dateParts = parts[0].split('/');
            let day = parseInt(dateParts[0], 10); 
            let month = parseInt(dateParts[1], 10) - 1; 
            let year = parseInt(dateParts[2], 10);
            
            if (isNaN(day) || isNaN(month) || isNaN(year)) return null;
            if (year < 100) year += 2000; if (year > 2500) year -= 543; 
            
            let hours = 0; let minutes = 0;
            if (parts[1]) { 
              const timeParts = parts[1].split(':'); 
              if (timeParts.length >= 2) { 
                hours = parseInt(timeParts[0], 10); 
                minutes = parseInt(timeParts[1], 10); 
              } 
            }
            const parsed = new Date(year, month, day, hours, minutes);
            return isNaN(parsed.getTime()) ? null : parsed;
          }
          const fallback = new Date(cleanStr); 
          return isNaN(fallback.getTime()) ? null : fallback;
        } catch (e) { return null; }
      };

// 🚀 ฟังก์ชันสำหรับตัดคำให้เหลือแค่ "วัน" เพื่อไปโชว์หน้าจอ
        const formatShowDays = (durationStr) => {
          if (!durationStr) return '-';
          // ค้นหาตัวเลขที่อยู่ข้างหน้าคำว่า "วัน"
          const match = durationStr.match(/(\d+)\s*วัน/);
          if (match) {
            return `${match[1]} วัน`;
          }
          // ถ้าไม่มีคำว่าวัน แสดงว่าเป็นงานที่เพิ่งแจ้งไม่ถึง 24 ชม. ให้โชว์ 0 วัน
          return '0 วัน';
        };

      const calculateTimeElapsed = (startDateStr) => {
        if (!startDateStr) return '-';
        const start = parseDate(startDateStr); if (!start) return '-';
        const diff = new Date() - start;
        if (diff < 0) return '0 นาที';
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        let result = '';
        if (days > 0) result += `${days} วัน `; if (hours > 0) result += `${hours} ชม. `;
        if (minutes > 0 || result === '') result += `${minutes} นาที`; return result;
      };

      const formatDate = (timestamp) => {
        if (!timestamp) return '-';
        try { 
            const d = new Date(timestamp);
            if (isNaN(d.getTime())) return timestamp; 
            return `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}, ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        } catch (e) { return '-'; }
      };

      const formatTime = (date) => date ? date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '-';

      const getSafeStatus = (rawStatus) => {
          let s = String(rawStatus || 'งานใหม่').trim();
          if (s === 'รอ' || s === 'รอตรวจสอบ' || s === '-' || s === '') return 'งานใหม่';
          if (s === 'เสนออนุมัติ') return 'อนุมัติแล้ว';
          if (s === 'กำลังดำเนินการ') return 'จ่ายงานแล้ว';
          if (s === 'เสร็จสิ้น' || s === 'เสร็จสิ้นแล้ว') return 'ปิดงาน (TECO)';
          const valid = ['งานใหม่', 'รับเรื่อง', 'อนุมัติแล้ว', 'จ่ายงานแล้ว', 'สับเปลี่ยน SAP แล้ว', 'ปิดงาน (TECO)', 'ยกเลิก'];
          if (!valid.includes(s)) return 'งานใหม่'; 
          return s;
      };

      const getProcessedImageUrl = (url) => {
        if (!url || url === "Error Uploading") return null;
        if (typeof url === 'string' && url.startsWith('data:image')) return url;
        
        const driveMatch = url.match(/id=([a-zA-Z0-9_-]+)/) || url.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (driveMatch && driveMatch[1]) {
           // ใช้ลิงก์ lh3 ตัวใหม่ที่ทำงานได้ 100% (ใส่เครื่องหมาย $ ให้ถูกต้อง)
           return `https://lh3.googleusercontent.com/d/${driveMatch[1]}`; 
        }
        return url;
      };

      const compressImage = (base64Str, maxWidth = 1000, quality = 0.7) => {
        return new Promise((resolve) => {
            const img = new Image(); img.src = base64Str;
            img.onload = () => {
                const canvas = document.createElement('canvas'); let width = img.width; let height = img.height;
                if (width > height) { if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; } } 
                else { if (height > maxWidth) { width = Math.round((width * maxWidth) / height); height = maxWidth; } }
                canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', quality));
            }; img.onerror = () => resolve(base64Str); 
        });
      };

      // ==========================================
      // คอมโพเนนต์พื้นฐาน
      // ==========================================
      class ErrorBoundary extends React.Component {
        constructor(props) { super(props); this.state = { hasError: false, error: null }; }
        static getDerivedStateFromError(error) { return { hasError: true, error }; }
        render() {
          if (this.state.hasError) {
            return (
              <div className="fixed inset-0 z-[99999] flex items-center justify-center p-4 bg-gray-50/90 backdrop-blur-sm animate-fade-in">
                <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center animate-fade-in border border-red-100">
                  <div className="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-5 border-4 border-red-100"><Icon name="Alert" className="w-10 h-10 text-red-500" /></div>
                  <h3 className="text-2xl font-black text-gray-800 mb-2">พบข้อผิดพลาด</h3>
                  <p className="text-gray-500 mb-5 font-medium text-sm">ขออภัย ระบบไม่สามารถแสดงผลได้ในขณะนี้</p>
                  <div className="bg-red-50 p-3 rounded-xl mb-6 text-left overflow-auto max-h-32 text-[10px] text-red-600 font-mono shadow-inner border border-red-100">
                    {this.state.error && this.state.error.toString()}
                  </div>
                  <button onClick={() => window.location.reload()} className="w-full bg-red-500 text-white font-bold py-3.5 rounded-xl hover:bg-red-600 transition shadow-md active:scale-95">รีโหลดหน้าเว็บ</button>
                </div>
              </div>
             );
          }
          return this.props.children;
        }
      }

      const CustomAlert = ({ message, onClose }) => {
        if (!message) return null;
        return (
          <div className="fixed inset-0 z-[99999] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in" onClick={onClose}>
            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center animate-fade-in border border-red-100" onClick={e => e.stopPropagation()}>
              <div className="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-5 border-4 border-red-100"><Icon name="Alert" className="w-10 h-10 text-red-500" /></div>
              <h3 className="text-2xl font-black text-gray-800 mb-2">แจ้งเตือน</h3>
              <p className="text-gray-500 mb-8 font-medium whitespace-pre-line leading-relaxed">{message}</p>
              <button type="button" onClick={onClose} className="w-full bg-red-500 text-white font-bold py-3.5 rounded-xl hover:bg-red-600 transition shadow-md active:scale-95">ตกลง</button>
            </div>
          </div>
        );
      };

      const ConfirmDeleteModal = ({ isOpen, onClose, onConfirm, title, message }) => {
        if (!isOpen) return null;
        return ReactDOM.createPortal(
          <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in">
            <div className="bg-white rounded-[2.5rem] shadow-2xl max-w-sm w-full p-8 text-center animate-fade-in border border-red-50">
              <div className="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6 border-4 border-red-100 animate-bounce">
                <Icon name="Trash" className="w-10 h-10 text-red-500" />
              </div>
              <h3 className="text-2xl font-black text-gray-800 mb-3 tracking-tight">{title || 'ยืนยันการลบ'}</h3>
              <p className="text-gray-500 mb-8 font-medium leading-relaxed">{message || 'ข้อมูลจะถูกลบออกถาวรและไม่สามารถกู้คืนได้'}</p>
              <div className="flex flex-col gap-3">
                <button onClick={onConfirm} className="w-full bg-red-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-red-200 hover:bg-red-600 active:scale-95 transition-all text-lg">ใช่, ฉันต้องการลบ</button>
                <button onClick={onClose} className="w-full bg-gray-100 text-gray-600 font-bold py-3.5 rounded-2xl hover:bg-gray-200 active:scale-95 transition-all text-sm">ยกเลิก</button>
              </div>
            </div>
          </div>,
          document.body
        );
      };

      // ==========================================
      // SPA Login Screen
      // ==========================================
      const LoginScreen = ({ onLoginSuccess }) => {
        const [username, setUsername] = useState('');
        const [password, setPassword] = useState('');
        const [rememberMe, setRememberMe] = useState(true);
        const [showPassword, setShowPassword] = useState(false);
        const [isLoading, setIsLoading] = useState(false);
        const [errorMsg, setErrorMsg] = useState('');

        const handleLogin = (e) => {
          e.preventDefault();
          setErrorMsg(''); 
          
          if (!username.trim() || !password.trim()) {
            setErrorMsg('กรุณากรอกชื่อผู้ใช้งานและรหัสผ่านให้ครบถ้วน');
            return;
          }

          setIsLoading(true);
          if (typeof google !== 'undefined' && google.script) {
            google.script.run
              .withSuccessHandler(res => {
                if (res.success) {
                  if (rememberMe) sessionStorage.setItem('authUser', JSON.stringify(res.user));
                  onLoginSuccess(res.user); 
                } else {
                  setIsLoading(false); setErrorMsg(res.message);
                }
              })
              .withFailureHandler(err => { setIsLoading(false); setErrorMsg('Error: ' + err.message); })
              .loginUser(username, password);
          } else {
            // Local fallback สำหรับตอนรันแบบไม่ต่อ AppScript
            setTimeout(() => {
              setIsLoading(false);
              let mockUser = null;
              if (username === 'admin') mockUser = { username: 'admin', name: 'ขวัญชัย (Local)', role: 'Admin', roles: ['Admin'] };
              else if (username === 'emp') mockUser = { username: 'emp', name: 'พนักงาน (Local)', role: 'Employee', roles: ['Employee'] };
              else if (username === 'approver') mockUser = { username: 'approver', name: 'สิทธิชัย (Local)', role: 'Approver', roles: ['Approver', 'Coordinator'] };
              
              if (mockUser) {
                 if (rememberMe) sessionStorage.setItem('authUser', JSON.stringify(mockUser));
                 onLoginSuccess(mockUser);
              } else setErrorMsg('ไม่พบข้อมูลผู้ใช้นี้ในระบบ');
            }, 1000);
          }
        };

        return (
          <div className="min-h-screen flex items-center justify-center relative px-4 py-10 w-full overflow-hidden bg-[#F4F2F8]">
            <div className="fixed top-[0%] left-[10%] w-72 md:w-96 h-72 md:h-96 bg-purple-300/40 rounded-full mix-blend-multiply filter blur-[60px] animate-blob z-0"></div>
            <div className="fixed top-[20%] right-[5%] w-72 md:w-96 h-72 md:h-96 bg-fuchsia-300/30 rounded-full mix-blend-multiply filter blur-[60px] animate-blob animation-delay-2000 z-0"></div>
            <div className="fixed bottom-[10%] left-[30%] w-60 md:w-80 h-60 md:h-80 bg-indigo-300/30 rounded-full mix-blend-multiply filter blur-[60px] animate-blob animation-delay-4000 z-0"></div>

            <div className="bg-white/95 backdrop-blur-xl rounded-[2rem] shadow-2xl w-full max-w-[360px] p-6 sm:p-8 relative z-10 border border-white/50 animate-fade-in-up">
              <div className="text-center mb-8 w-full">
                <div className="w-[80px] h-[80px] bg-gradient-to-br from-[#722a96] to-[#5F259F] rounded-[1.5rem] flex items-center justify-center mx-auto mb-6 shadow-[0_10px_25px_-5px_rgba(95,37,159,0.5)] transform -rotate-0 hover:rotate-0 hover:scale-105 transition-all duration-300">
                  <Icon name="Zap" className="w-10 h-10 text-white" />
                </div>
                <h1 className="text-[22px] sm:text-2xl md:text-3xl font-black tracking-tight leading-none mb-3 whitespace-nowrap"><span className="text-gray-800">PEA</span> <span className="text-[#722a96]">MTS</span></h1>
                <div className="inline-block px-3 py-1 bg-purple-50 rounded-full"><p className="text-[#722a96] text-[10px] font-bold uppercase tracking-[0.2em]">Meter Tracking System</p></div>
              </div>

              <form onSubmit={handleLogin} className="space-y-5">
                <div>
                  <label className="text-[14px] font-extrabold text-gray-600 mb-2 block ml-1">ชื่อผู้ใช้งาน (Username)</label>
                  <div className="relative group">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#8B5CF6] transition-colors"><Icon name="User" className="w-5 h-5" /></div>
                    <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full pl-12 pr-4 py-4 bg-[#F8FAFC] border border-gray-200 rounded-2xl focus:bg-white focus:border-[#8B5CF6] focus:ring-4 focus:ring-[#8B5CF6]/10 outline-none text-gray-800 font-medium transition-all" placeholder="พิมพ์ชื่อผู้ใช้งาน..." />
                  </div>
                </div>

                <div>
                  <label className="text-[14px] font-extrabold text-gray-600 mb-2 block ml-1">รหัสผ่าน (Password)</label>
                  <div className="relative group">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#8B5CF6] transition-colors"><Icon name="Lock" className="w-5 h-5" /></div>
                    <input type={showPassword ? "text" : "password"} value={password} onChange={(e) => setPassword(e.target.value)} className="w-full pl-12 pr-12 py-4 bg-[#F8FAFC] border border-gray-200 rounded-2xl focus:bg-white focus:border-[#8B5CF6] focus:ring-4 focus:ring-[#8B5CF6]/10 outline-none text-gray-800 font-medium transition-all text-lg tracking-widest placeholder:tracking-normal" placeholder="••••••••" />
                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none transition-colors"><Icon name={showPassword ? "EyeOff" : "Eye"} className="w-5 h-5" /></button>
                  </div>
                </div>

                <div className="flex items-center mt-2 ml-1">
                  <input type="checkbox" id="remember" checked={rememberMe} onChange={(e) => setRememberMe(e.target.checked)} className="custom-checkbox rounded text-[#8B5CF6] focus:ring-[#8B5CF6] border-gray-300" />
                  <label htmlFor="remember" className="ml-2.5 text-sm font-bold text-gray-600 cursor-pointer select-none">จดจำการเข้าสู่ระบบ</label>
                </div>

                {errorMsg && ( <div className="p-3.5 bg-red-50 text-red-500 text-[13px] font-bold rounded-2xl border border-red-100 flex items-center justify-center gap-2 animate-fade-in text-center"><span className="truncate">{errorMsg}</span></div> )}

                <button type="submit" disabled={isLoading} className="w-full bg-[#722a96] hover:bg-[#87246a] text-white font-bold py-4 rounded-2xl shadow-[0_8px_20px_-6px_rgba(139,92,246,0.4)] hover:shadow-[0_12px_25px_-6px_rgba(139,92,246,0.5)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-[17px] mt-6 disabled:opacity-70 disabled:cursor-not-allowed">
                  {isLoading ? <><Icon name="Loader" className="w-5 h-5 animate-spin" /> กำลังตรวจสอบ...</> : <>เข้าสู่ระบบ</>}
                </button>
              </form>
            </div>
            <div className="absolute bottom-6 w-full text-center z-10"><p className="text-[9px] md:text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">© 2026 FAST TRACK PEA KPN ©</p></div>
          </div>
        );
      };

      // ==========================================
      // ย่อยส่วนประกอบต่างๆ ของแอปหลัก
      // ==========================================
      const CustomerCheckView = ({ jobs = [], currentUser, onStatusChange, onRefresh }) => {
        const [query, setQuery] = useState(() => sessionStorage.getItem('chkQuery') || '');
        const [resultsList, setResultsList] = useState(() => { const saved = sessionStorage.getItem('chkResults'); return saved ? JSON.parse(saved) : []; }); 
        const [expandedIndex, setExpandedIndex] = useState(() => { const saved = sessionStorage.getItem('chkExpanded'); return saved && saved !== 'undefined' ? JSON.parse(saved) : null; }); 
        const [currentPage, setCurrentPage] = useState(() => { const saved = sessionStorage.getItem('chkPage'); return saved ? parseInt(saved, 10) : 1; }); 
        const itemsPerPage = 50; 
        const [loading, setLoading] = useState(false); const [error, setError] = useState(''); const [copied, setCopied] = useState('');

        // 💡 State สำหรับ Pop-up ปิดงาน (TECO)
        const [tecoModalJob, setTecoModalJob] = useState(null); // เก็บข้อมูลใบงานที่จะปิด
        const [auditImages, setAuditImages] = useState([]);
        const [isSubmittingTECO, setIsSubmittingTECO] = useState(false);
        const [editingJob, setEditingJob] = useState(null); // 🔴 เพิ่มตัวแปรนี้ ไม่งั้นกดยกเลิกแล้วหน้าจะขาว

        // 💡 เช็คสิทธิ์ Audit
        const roles = getUserRoles(currentUser);
        const canAuditTECO = roles.includes('Audit') || roles.includes('Admin');

        useEffect(() => { sessionStorage.setItem('chkQuery', query); sessionStorage.setItem('chkResults', JSON.stringify(resultsList)); sessionStorage.setItem('chkExpanded', JSON.stringify(expandedIndex)); sessionStorage.setItem('chkPage', currentPage); }, [query, resultsList, expandedIndex, currentPage]);
        
        // เคลียร์ค่าเมื่อเปลี่ยนแถบ
        useEffect(() => { setAuditImages([]); setIsSubmittingTECO(false); setTecoModalJob(null); }, [expandedIndex]);

        const copyToClipboard = (text, type) => { navigator.clipboard.writeText(text); setCopied(type); setTimeout(() => setCopied(''), 2000); };

        const handleSearch = (e) => {
          e.preventDefault(); if (!query.trim()) return;
          setLoading(true); setError(''); setResultsList([]); setExpandedIndex(null); setCurrentPage(1); 
          if (typeof google !== 'undefined' && google.script) {
             google.script.run.withSuccessHandler(res => { setLoading(false); if (res.found && res.data && res.data.length > 0) { setResultsList(res.data); if (res.data.length === 1) setExpandedIndex(0); } else { setError(res.message || 'ไม่พบข้อมูลในระบบ'); } }).withFailureHandler((err) => { setLoading(false); setError('เกิดข้อผิดพลาด: ' + err.message); }).searchCustomerMulti(query); 
          } else { setTimeout(() => { setLoading(false); setError('ไม่พบข้อมูลผู้ใช้ไฟฟ้าในระบบ'); }, 800); }
        };

        // 💡 ฟังก์ชันบันทึกปิดงานผ่าน Pop-up
        const handleCloseJob = () => {
           if (!tecoModalJob) return;
           if (auditImages.length === 0) {
              alert('กรุณาแนบรูปถ่ายหรือไฟล์หลักฐานอย่างน้อย 1 รูป เพื่อยืนยันการปิดงาน (TECO)');
              return;
           }
           
           // เก็บค่าเอาไว้ก่อนเคลียร์หน้าจอ
           const jobId = tecoModalJob.id;
           const currentImages = [...auditImages];

           // 🚀 1. ปิด Popup ทันที และเคลียร์ค่าบนหน้าต่าง
           setTecoModalJob(null); 
           setExpandedIndex(null); 
           setAuditImages([]);
           
           // เปลี่ยนสถานะบนตารางเป็น "ปิดงาน (TECO)" ให้เห็นทันที (Optimistic)
           onStatusChange(jobId, 'ปิดงาน (TECO)', { auditLink: currentImages.join(',') }, 'optimistic');

           // 🚀 2. นำรูปไปบีบอัดและส่งไปเซฟหลังบ้านแบบทำงานเบื้องหลัง (ไม่บล็อกหน้าจอ)
           Promise.all(
             currentImages.map(img => img.startsWith('data:image') || img.startsWith('data:application/pdf') ? compressImage(img) : img)
           ).then(processedImages => {
             // ส่งข้อมูลไปเซฟที่ Google Sheets และ Drive
             // (แนบ auditImages เป็น Array ไปด้วยเพื่อให้ Backend ใช้สร้างไฟล์รูปได้ตามโค้ด Code.gs ของคุณ)
             onStatusChange(jobId, 'ปิดงาน (TECO)', { 
               auditLink: processedImages.join(','),
               auditImages: processedImages 
             });
           }).catch(err => {
             console.error('เกิดข้อผิดพลาดในการประมวลผลรูปภาพ:', err);
           });
        };

        const formatData = (val) => { const str = String(val || '').trim(); if (!str || str === '-' || str.toUpperCase() === '#N/A' || str.toUpperCase() === 'N/A') return <span className="text-gray-400 font-normal text-[14px]">ไม่พบข้อมูล</span>; return str; };
        const totalPages = Math.ceil(resultsList.length / itemsPerPage); const startIndex = (currentPage - 1) * itemsPerPage; const currentItems = resultsList.slice(startIndex, startIndex + itemsPerPage);

        const renderPagination = () => {
          if (totalPages <= 1) return null; const pages = []; let startPage = Math.max(1, currentPage - 2); let endPage = Math.min(totalPages, currentPage + 2);
          if (endPage - startPage < 4) { if (startPage === 1) endPage = Math.min(totalPages, 5); else if (endPage === totalPages) startPage = Math.max(1, totalPages - 4); }
          for (let i = startPage; i <= endPage; i++) { pages.push(<button key={i} onClick={() => { setCurrentPage(i); setExpandedIndex(null); }} className={`w-10 h-10 flex items-center justify-center rounded-xl font-bold transition-all ${currentPage === i ? 'bg-[#5F259F] text-white shadow-md scale-110' : 'bg-white text-purple-600 hover:bg-purple-100 hover:text-[#5F259F] border border-purple-200'}`}>{i}</button>); }
          return (
            <div className="flex flex-col items-center justify-center pt-6 pb-2 space-y-3 border-t border-purple-100 mt-4 animate-fade-in w-full">
              <div className="text-sm font-bold text-gray-500">หน้า {currentPage} จาก {totalPages}</div>
              <div className="flex items-center gap-1.5 sm:gap-2">
                <button onClick={() => { setCurrentPage(prev => Math.max(prev - 1, 1)); setExpandedIndex(null); }} disabled={currentPage === 1} className="w-10 h-10 flex items-center justify-center rounded-xl font-bold bg-white text-purple-600 border border-purple-200 hover:bg-purple-100 hover:text-[#5F259F] transition-all disabled:opacity-50 disabled:bg-gray-50 disabled:text-gray-400 disabled:border-gray-200 shadow-sm"><svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                {startPage > 1 && (<><button onClick={() => { setCurrentPage(1); setExpandedIndex(null); }} className="w-10 h-10 hidden sm:flex items-center justify-center rounded-xl font-bold bg-white text-purple-600 border border-purple-200 hover:bg-purple-100 transition-all">1</button>{startPage > 2 && <span className="text-gray-400 hidden sm:block">...</span>}</>)}
                {pages}
                {endPage < totalPages && (<>{endPage < totalPages - 1 && <span className="text-gray-400 hidden sm:block">...</span>}<button onClick={() => { setCurrentPage(totalPages); setExpandedIndex(null); }} className="w-10 h-10 hidden sm:flex items-center justify-center rounded-xl font-bold bg-white text-purple-600 border border-purple-200 hover:bg-purple-100 transition-all">{totalPages}</button></>)}
                <button onClick={() => { setCurrentPage(prev => Math.min(prev + 1, totalPages)); setExpandedIndex(null); }} disabled={currentPage === totalPages} className="w-10 h-10 flex items-center justify-center rounded-xl font-bold bg-white text-purple-600 border border-purple-200 hover:bg-purple-100 hover:text-[#5F259F] transition-all disabled:opacity-50 disabled:bg-gray-50 disabled:text-gray-400 disabled:border-gray-200 shadow-sm"><svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
              </div>
            </div>
          );
        };

{/* 🔴 เพิ่มเพื่อให้หน้าตรวจสอบข้อมูลรู้จักและเปิดกล่องแก้ไข/ยกเลิกงานได้สำเร็จ */}
            {editingJob && <JobCompletionModal job={editingJob} onClose={() => setEditingJob(null)} onConfirm={(id, d) => { onStatusChange(id, null, d, 'edit'); setEditingJob(null); }} onDelete={() => {}} mode="edit" currentUser={currentUser} />}

            
        return (
          <div className="max-w-4xl w-full mx-auto pb-8 px-4 animate-fade-in relative">
             <div className="text-center mb-6 md:mb-8 mt-4 md:mt-8">
               {resultsList.length === 0 && <div className="inline-block p-4 rounded-full bg-blue-50 mb-4 shadow-inner border border-blue-100 animate-fade-in"><Icon name="Search" className="w-8 h-8 text-blue-600" /></div>}
               <h2 className="text-2xl md:text-3xl font-black text-[#5F259F] tracking-tight">ตรวจสอบข้อมูลผู้ใช้ไฟฟ้า</h2>
             </div>
             <form onSubmit={handleSearch} className="relative mb-8 max-w-2xl mx-auto">
               <div className="relative flex items-center">
                 <Icon name="Search" className="absolute left-4 md:left-5 w-5 h-5 md:w-6 md:h-6 text-gray-400 pointer-events-none" />
                 <input type="text" value={query} onChange={(e) => setQuery(e.target.value)} placeholder="กรอก CA, PEA หรือ ชื่อ-นามสกุล..." className="w-full py-3.5 md:py-4 pl-12 md:pl-14 pr-[100px] md:pr-[130px] bg-white border border-gray-200 rounded-2xl shadow-sm focus:ring-2 focus:ring-[#5F259F] outline-none text-[14px] md:text-lg transition-all" />
                 <button type="submit" disabled={loading || !query} className="absolute right-2 top-2 bottom-2 bg-[#5F259F] text-white px-4 md:px-6 rounded-xl font-bold hover:bg-[#4a1d7c] disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center gap-2 text-sm md:text-base shadow-md">{loading ? <Icon name="Loader" className="w-4 h-4 md:w-5 md:h-5 animate-spin" /> : <Icon name="Search" className="w-4 h-4 md:w-5 md:h-5 hidden sm:block" />} <span>ค้นหา</span></button>
               </div>
             </form>
             {error && (<CustomAlert message={error} onClose={() => setError('')} />)}
             
             {resultsList.length > 0 && !loading && (
                <div className="max-w-4xl w-[90%] sm:w-full mx-auto animate-fade-in space-y-4">
                   {resultsList.length > 1 && <div className="text-sm font-bold text-gray-500 mb-3 ml-2 flex items-center gap-2"><div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>พบข้อมูลทั้งหมด {resultsList.length} รายการ</div>}
                   {currentItems.map((item, idx) => {
                      const isExpanded = expandedIndex === idx;
                      
                      // 💡 ค้นหาว่ามีใบงานที่เชื่อมโยงกับ CA/PEA นี้ และสถานะ "สับเปลี่ยน SAP แล้ว" หรือไม่?
                      const targetJob = jobs.find(j => 
                         (String(j.meterId).trim() === String(item.meterId).trim() || 
                          String(j.ca).trim() === String(item.ca || item.caNo).trim() || 
                          String(j.caNo).trim() === String(item.ca || item.caNo).trim()) && 
                         getSafeStatus(j.status) === 'สับเปลี่ยน SAP แล้ว'
                      );

                      return (
                        <div key={idx} className={`bg-white rounded-2xl shadow-sm border transition-all duration-300 overflow-hidden ${isExpanded ? 'border-[#5F259F] shadow-md' : 'border-purple-200 hover:border-[#5F259F]'}`}>

                                      <div className="border-b border-gray-100 pb-3"><label className="text-[12px] md:text-xs text-gray-400 font-bold uppercase tracking-widest block mb-1">ประเภทการติดตั้ง</label><div className="text-sm md:text-base font-medium text-gray-600 leading-relaxed">{formatData(item.installType)}</div></div>

                </div>
             )}

             {/* 💡 Pop-up Modal สำหรับปิดงาน (TECO) */}
             {tecoModalJob && ReactDOM.createPortal(
                <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in" onClick={() => { if(!isSubmittingTECO) { setTecoModalJob(null); setAuditImages([]); } }}>
                  <div className="bg-white rounded-[2rem] shadow-2xl max-w-lg w-full overflow-hidden flex flex-col animate-fade-in-up border border-emerald-100" onClick={e => e.stopPropagation()}>
                    
                    {/* Header */}
                    <div className="bg-gradient-to-r from-emerald-500 to-emerald-600 p-5 sm:p-6 text-white flex justify-between items-center shadow-md relative z-10">
                      <div>
                        <h2 className="text-xl sm:text-2xl font-black flex items-center gap-2 tracking-tight">

                      <button disabled={isSubmittingTECO} onClick={() => { setTecoModalJob(null); setAuditImages([]); }} className="p-2 hover:bg-white/20 rounded-full transition disabled:opacity-50">
                        <Icon name="X" className="w-6 h-6" />
                      </button>
                    </div>
                    
                    {/* Body */}
                    <div className="p-6 sm:p-8 space-y-6 bg-emerald-50/30">
                      <div className="bg-white p-4 rounded-2xl shadow-sm border border-emerald-100 flex justify-between items-center">
                        <div className="flex flex-col">
                          <span className="text-gray-400 text-[10px] font-bold uppercase tracking-widest">เลขที่ใบงานอ้างอิง</span>
                          <span className="text-xl font-black text-gray-800">{tecoModalJob.jobNo || tecoModalJob.id || '-'}</span>
                        </div>
                        <div className="bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider">
                          รอปิดงาน
                        </div>
                      </div>
                      
                      <div className="bg-white p-5 sm:p-6 rounded-2xl border border-emerald-200 shadow-sm space-y-4">
                        <div>
                          <label className="text-[15px] font-black text-emerald-800 flex items-center gap-2">
                            <Icon name="Camera" className="w-5 h-5 text-emerald-600" />

                          </label>
                          <p className="text-[11px] text-emerald-600/70 font-bold mt-1">ต้องแนบอย่างน้อย 1 ไฟล์ (สูงสุด 5 ไฟล์ รองรับ JPG, PNG, PDF)</p>
                        </div>
                        
                        <div className="flex flex-wrap gap-3">
                          {auditImages.map((img, imgIdx) => (
                            <div key={imgIdx} className="relative w-20 h-20 sm:w-24 sm:h-24 rounded-xl overflow-hidden border border-emerald-200 bg-black flex justify-center group shrink-0">
                              {img.includes('application/pdf') ? (
                                <div className="w-full h-full bg-white flex flex-col items-center justify-center">
                                    <Icon name="FileText" className="w-8 h-8 text-emerald-500" />
                                    <span className="text-[9px] font-bold text-gray-500 mt-1">PDF</span>
                                </div>
                              ) : (
                                <img src={img} alt="Audit Preview" className="h-full object-cover w-full" />

                                <button type="button" onClick={() => setAuditImages(auditImages.filter((_, i) => i !== imgIdx))} className="absolute top-1.5 right-1.5 bg-red-500 text-white p-1 rounded-full shadow-lg opacity-100 transition active:scale-95">
                                  <Icon name="X" className="w-3 h-3" />
                                </button> 
                              )}
